<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Management — EHS Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F5F3;--surface:#FFFFFF;--ink:#14161A;--ink-2:#3A3F47;--muted:#6B7280;--faint:#9AA1AC;
  --line:#E4E1DB;--accent:#7C3AED;--navy:#101A33;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  --shadow-sm:2px 2px 0 rgba(16,26,51,.05);}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;display:grid;place-items:center;min-height:100vh;padding:32px}
.card{width:100%;max-width:560px;background:var(--surface);border:1px solid var(--line);
  box-shadow:var(--shadow-sm);padding:40px}
.top{display:flex;align-items:center;gap:16px;margin-bottom:22px}
.tile{display:inline-grid;place-items:center;width:52px;height:52px;font-family:var(--mono);
  font-weight:700;font-size:17px;color:#fff;background:#7C3AED;box-shadow:var(--shadow-sm)}
h1{font-size:23px;font-weight:800;letter-spacing:-.02em}
.tag{font-family:var(--mono);font-size:11.5px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.03em;margin-top:3px}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;
  font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--line);
  color:var(--muted);margin-left:auto}
.chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.scope{font-size:14.5px;line-height:1.6;color:var(--ink-2);border-top:1px solid var(--line);padding-top:22px}
.scope .lbl{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.foot{display:flex;align-items:center;gap:9px;margin-top:26px;padding-top:18px;border-top:1px solid var(--line);
  font-size:12px;color:var(--faint)}
.foot img{height:16px}
</style>
</head>
