<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EHS Delivery Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F5F3; --surface:#FFFFFF; --surface-2:#F7F6F4; --surface-3:#F0EEEB;
  --sidebar:#FBFAF9;
  --ink:#1A1A1A; --ink-2:#3F3F3F; --muted:#71717A; --faint:#A1A1A6;
  --line:#EAE7E2; --line-2:#F0EEEA;
  --accent:#3B6FE0; --accent-hover:#2F5FD0; --accent-soft:#EAF1FD;
  --tech:#2743E0; --tech-soft:#ECEFFE;
  --creative:#C2410C; --creative-soft:#FCEEE7;
  --good:#0E8F5A; --good-soft:#E4F3EC; --warn:#B96A00; --warn-soft:#FBF0E0; --crit:#CE2F26; --crit-soft:#FBE9E8;
  --shadow:0 1px 2px rgba(30,25,20,.05),0 8px 24px -12px rgba(30,25,20,.12);
  --shadow-sm:0 1px 2px rgba(30,25,20,.05);
}
*{box-sizing:border-box;border-radius:0!important}
.rnd,.avatar,.dot,.rnd *{border-radius:999px!important}
html,body{height:auto;min-height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-weight:450;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.01em}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.mono{font-family:"Roboto Mono",monospace}
button{font-family:inherit;cursor:pointer;border:0;background:none}
input,select,textarea{font-family:inherit;font-size:13px;color:var(--ink)}
a{color:var(--accent);text-decoration:none}
.hide{display:none!important}
.ico{width:16px;height:16px;flex:none;stroke:currentColor;stroke-width:1.75;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle}

/* ---------- Shell ---------- */
.appwrap{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topnav{flex:none;display:flex;align-items:center;gap:22px;height:56px;padding:0 22px;background:#fff;border-bottom:1.5px solid #1A1A1A}
.tn-logo img{height:28px;display:block}
.tn-title{font-weight:800;font-size:15px;letter-spacing:-.02em}
.tn-title .b{color:var(--accent)}
.tn-spacer{flex:1}
.tn-right{display:flex;align-items:center;gap:12px}
.pill-link{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--accent);border:1.25px solid var(--accent);padding:6px 11px;background:var(--accent-soft)}
.pill-link:hover{background:#dfeafd}
.acct{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 6px;border:1px solid transparent}
.acct:hover{border-color:var(--line)}
.acct .who{font-size:12.5px;font-weight:600;line-height:1.1}
.acct .role{font-size:11px;color:var(--muted)}

.body{flex:1;display:flex;overflow:hidden}
.side{width:210px;flex:none;background:var(--sidebar);border-right:1px solid var(--line);padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow:auto}
.side .grp{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:12px 10px 5px}
.nav{display:flex;align-items:center;gap:10px;padding:8px 10px;font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer;border:1px solid transparent}
.nav:hover{background:var(--surface-3)}
.nav.on{background:#fff;border-color:var(--line);color:var(--ink);font-weight:600;box-shadow:var(--shadow-sm)}
.nav svg{width:16px;height:16px;flex:none;stroke:currentColor;stroke-width:1.75;fill:none}
.nav .ct{margin-left:auto;font-size:11px;font-weight:600;color:var(--muted);background:var(--surface-3);padding:1px 7px}
.main{flex:1;overflow:auto;padding:22px 26px 60px}

/* ---------- Headers / stats ---------- */
.phead{display:flex;align-items:flex-end;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.phead h1{font-size:22px}
.phead .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.spacer{flex:1}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.stat{background:#fff;border:1px solid var(--line);padding:13px 15px;box-shadow:var(--shadow-sm)}
.stat .n{font-size:24px;font-weight:800;letter-spacing:-.02em}
.stat .l{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:1px;display:flex;align-items:center;gap:6px}

/* ---------- Toolbar / filters ---------- */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);padding:7px 11px;font-size:12.5px;font-weight:500;color:var(--ink-2);cursor:pointer;box-shadow:var(--shadow-sm)}
.chip:hover{border-color:#d9d5cd}
.chip .v{font-weight:600;color:var(--ink)}
.chip svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.search{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);padding:0 10px;box-shadow:var(--shadow-sm)}
.search input{border:0;outline:0;padding:8px 0;width:190px;background:none}
.btn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:8px 13px;border:1.25px solid var(--ink);background:var(--ink);color:#fff}
.btn:hover{background:#000}
.btn.ghost{background:#fff;color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{border-color:var(--ink)}
.btn.accent{background:var(--accent);border-color:var(--accent)}
.btn.accent:hover{background:var(--accent-hover)}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* ---------- Table ---------- */
.tablewrap{background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);overflow:auto}
table{border-collapse:collapse;width:100%;font-size:12.5px}
th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line);background:var(--surface-2);white-space:nowrap;position:sticky;top:0}
td{padding:11px 12px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tr:last-child td{border-bottom:0}
tr.trow{cursor:pointer}
tr.trow:hover td{background:var(--surface-2)}
.grouprow td{background:var(--surface-3);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-2);padding:8px 12px}
.key{font-family:"Roboto Mono",monospace;font-size:11.5px;color:var(--muted);font-weight:500}
.ttl{font-weight:600;color:var(--ink)}
.empty{padding:50px;text-align:center;color:var(--muted)}
.empty svg{width:34px;height:34px;stroke:var(--faint);fill:none;stroke-width:1.5;margin-bottom:8px}

/* ---------- Badges ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 8px;border:1px solid}
.cat-tech{color:var(--tech);background:var(--tech-soft);border-color:#c9d2fb}
.cat-creative{color:var(--creative);background:var(--creative-soft);border-color:#f3cdb9}
.dot{width:7px;height:7px;display:inline-block}
.st{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600}
.pri{width:14px;height:14px;display:inline-block;vertical-align:-2px}
.age{font-size:11px;font-weight:600;padding:2px 7px;border:1px solid}
.age.fresh{color:var(--good);border-color:#bfe6d0;background:var(--good-soft)}
.age.warn{color:var(--warn);border-color:#eed9b2;background:var(--warn-soft)}
.age.old{color:var(--crit);border-color:#f0c8c5;background:var(--crit-soft)}
.tag{display:inline-flex;align-items:center;font-size:10.5px;font-weight:600;color:var(--ink-2);background:var(--surface-3);border:1px solid var(--line);padding:1px 7px;margin:0 3px 3px 0}
.overdue{color:var(--crit);font-weight:700}

/* detail sections */
.dsec{border-top:1px solid var(--line);padding-top:14px}
.dsec:first-child{border-top:0;padding-top:0}
.dsec-h{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.kv{display:grid;grid-template-columns:120px 1fr;gap:6px 12px;font-size:12.5px;align-items:start}
.kv .k{color:var(--muted);font-weight:500}
.kv .v{font-weight:500}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:12px}
.tabs button{padding:8px 12px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.on{color:var(--ink);border-bottom-color:var(--accent)}

/* report */
.rgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.rgrid.three{grid-template-columns:repeat(3,1fr)}
.rcard{background:#fff;border:1px solid var(--line);box-shadow:var(--shadow-sm);padding:16px 18px}
.rcard h4{font-size:12.5px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.rcard h4 .sub{margin-left:auto;font-size:11px;color:var(--muted);font-weight:500}
.barrow{display:grid;grid-template-columns:120px 1fr 42px;gap:10px;align-items:center;margin-bottom:9px;font-size:12px}
.barrow .lab{color:var(--ink-2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bartrack{height:16px;background:var(--surface-3);position:relative;overflow:hidden}
.barfill{height:100%;transition:.3s}
.barrow .val{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;font-size:11.5px}
.legend span{display:inline-flex;align-items:center;gap:6px;color:var(--ink-2)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:#fff;border:1px solid var(--line);padding:15px 17px;box-shadow:var(--shadow-sm)}
.kpi .n{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1}
.kpi .l{font-size:11.5px;color:var(--muted);margin-top:5px}
.kpi .d{font-size:10.5px;color:var(--faint);margin-top:2px}

/* ---------- Board ---------- */
.board{display:flex;gap:12px;align-items:flex-start;overflow-x:auto;padding-bottom:8px}
.col{flex:none;width:280px;background:var(--surface-2);border:1px solid var(--line)}
.col-h{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);font-size:12px;font-weight:700}
.col-h .ct{margin-left:auto;font-size:11px;color:var(--muted);background:#fff;border:1px solid var(--line);padding:0 7px}
.col-b{padding:10px;display:flex;flex-direction:column;gap:9px;min-height:80px;max-height:calc(100vh - 320px);overflow:auto}
.card{background:#fff;border:1px solid var(--line);padding:11px 12px;box-shadow:var(--shadow-sm);cursor:pointer}
.card:hover{border-color:#d4cfc6;box-shadow:var(--shadow)}
.card .k{font-family:"Roboto Mono",monospace;font-size:10.5px;color:var(--muted)}
.card .t{font-weight:600;font-size:12.5px;margin:5px 0 8px;line-height:1.35}
.card .m{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ---------- Modal ---------- */
.scrim{position:fixed;inset:0;background:rgba(20,18,15,.42);display:flex;align-items:center;justify-content:center;padding:24px;z-index:60;opacity:0;pointer-events:none;transition:.14s}
.scrim.on{opacity:1;pointer-events:auto}
.modal{background:#fff;border:1.5px solid var(--ink);box-shadow:0 30px 60px -20px rgba(20,18,15,.4);width:100%;max-width:860px;max-height:88vh;overflow:auto;display:flex;flex-direction:column}
.modal.sm{max-width:520px}
.modal.md{max-width:660px}
.mhead{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
.mhead h3{font-size:15px}
.mbody{padding:20px;display:flex;flex-direction:column;gap:16px}
.mfoot{display:flex;align-items:center;gap:9px;padding:14px 20px;border-top:1px solid var(--line);position:sticky;bottom:0;background:#fff}
.x{margin-left:auto;width:30px;height:30px;display:grid;place-items:center;border:1px solid var(--line);color:var(--muted)}
.x:hover{border-color:var(--ink);color:var(--ink)}

/* detail split */
.dsplit{display:grid;grid-template-columns:1fr 250px;gap:0}
.dmain{padding:20px;display:flex;flex-direction:column;gap:16px;border-right:1px solid var(--line)}
.dside{padding:18px;display:flex;flex-direction:column;gap:14px;background:var(--surface-2)}
.dfield label{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.dfield .val{font-size:13px;font-weight:500}
.desc{font-size:13.5px;line-height:1.6;color:var(--ink-2);white-space:pre-wrap}
.attach{display:flex;gap:8px;flex-wrap:wrap}
.attach a{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);padding:6px 9px;font-size:11.5px;color:var(--ink-2);font-weight:500;background:#fff}
.attach img{max-width:100%;border:1px solid var(--line);margin-top:6px}
.acts{display:flex;flex-direction:column;gap:9px}
.act{display:flex;gap:9px;font-size:12px;align-items:flex-start}
.act .ai{width:22px;height:22px;flex:none;background:var(--surface-3);display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--muted)}
.act .txt{color:var(--ink-2)}
.act .tm{color:var(--faint);font-size:11px}
.cmt{display:flex;gap:9px}
.cmtbox{flex:1;display:flex;gap:8px}
.cmtbox input{flex:1;border:1px solid var(--line);padding:8px 10px}

/* forms */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11.5px;font-weight:700;color:var(--ink-2)}
.field .req{color:var(--crit)}
.field input[type=text],.field input[type=email],.field input[type=password],.field select,.field textarea,.inp{border:1.25px solid var(--line);padding:9px 11px;font-size:13px;background:#fff;width:100%}
.field textarea{min-height:90px;resize:vertical;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus,.inp:focus{outline:0;border-color:var(--accent)}
.hint{font-size:11px;color:var(--muted)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.seg{display:inline-flex;border:1.25px solid var(--line);overflow:hidden}
.seg button{padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--muted);background:#fff;border-right:1px solid var(--line)}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--ink);color:#fff}
.drop{border:1.5px dashed var(--line);padding:18px;text-align:center;color:var(--muted);font-size:12.5px;cursor:pointer;background:var(--surface-2)}
.drop:hover{border-color:var(--accent);color:var(--accent)}
.filelist{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.filerow{display:flex;align-items:center;gap:9px;font-size:12px;border:1px solid var(--line);padding:7px 9px;background:#fff}
.filerow .rm{margin-left:auto;color:var(--crit);font-weight:600;cursor:pointer;font-size:11px}

/* checklist rows (perms/roles) */
.checkrow{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);background:#fff;font-size:12.5px}
.checkrow:hover{background:var(--surface-2)}
.checkrow input{width:15px;height:15px;accent-color:var(--accent)}
.checkrow .d{color:var(--muted);font-size:11px}
.checkgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sw{position:relative;width:34px;height:19px;background:#cfd0d4;transition:.15s;flex:none;cursor:pointer}
.sw.on{background:var(--good)}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;background:#fff;transition:.15s;border-radius:999px!important}
.sw.on::after{left:17px}

/* pill toggles for categories */
.pills{display:flex;gap:7px;flex-wrap:wrap}
.pt{padding:6px 12px;font-size:12px;font-weight:600;border:1.25px solid var(--line);background:#fff;color:var(--muted);cursor:pointer}
.pt.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}

/* menu popover */
.menu{position:fixed;background:#fff;border:1px solid var(--ink);box-shadow:var(--shadow);z-index:80;min-width:170px;padding:5px;display:none;max-height:320px;overflow:auto}
.menu.on{display:block}
.menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:8px 10px;font-size:12.5px;font-weight:500;color:var(--ink-2)}
.menu button:hover{background:var(--surface-2)}
.menu button.on{color:var(--accent);font-weight:600}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:11px 18px;box-shadow:var(--shadow);z-index:200;opacity:0;pointer-events:none;transition:.18s}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* avatar */
.avatar{display:inline-flex;align-items:center;justify-content:center;font-weight:700;flex:none;line-height:1}

/* ---------- Login ---------- */
.login{min-height:100vh;display:grid;place-items:center;background:var(--bg);padding:24px}
.loginbox{width:100%;max-width:380px;background:#fff;border:1.5px solid var(--ink);box-shadow:var(--shadow);padding:28px}
.loginbox .lg{display:flex;justify-content:center;margin-bottom:18px}
.loginbox .lg img{height:30px}
.loginbox h2{font-size:18px;text-align:center;margin-bottom:4px}
.loginbox .sub{font-size:12.5px;color:var(--muted);text-align:center;margin-bottom:20px}
.demo-accts{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
.demo-accts .lbl{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.demo-acct{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);margin-bottom:6px;cursor:pointer;font-size:12px}
.demo-acct:hover{border-color:var(--accent);background:var(--accent-soft)}
.demo-acct .who{font-weight:600}
.demo-acct .r{margin-left:auto;font-size:10.5px;color:var(--muted)}

/* ---------- Public form ---------- */
.pubwrap{min-height:100vh;background:var(--bg);padding:40px 20px}
.pubcard{max-width:560px;margin:0 auto;background:#fff;border:1.5px solid var(--ink);box-shadow:var(--shadow)}
.pub-h{padding:22px 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.pub-h img{height:26px}
.pub-h .t{font-weight:800;font-size:16px}
.pub-h .t .b{color:var(--accent)}
.pub-b{padding:24px 26px;display:flex;flex-direction:column;gap:17px}
.pub-intro{font-size:13px;color:var(--muted);line-height:1.5}
.pub-foot{padding:16px 26px;border-top:1px solid var(--line);font-size:11.5px;color:var(--faint);text-align:center}
.success{max-width:560px;margin:0 auto;background:#fff;border:1.5px solid var(--ink);box-shadow:var(--shadow);padding:40px;text-align:center}
.success .ic{width:56px;height:56px;margin:0 auto 16px;border:2px solid var(--good);color:var(--good);display:grid;place-items:center;border-radius:999px!important}
.success .ic svg{width:28px;height:28px;stroke:currentColor;fill:none;stroke-width:2.5}
.success h2{font-size:20px;margin-bottom:8px}
.success .key{font-size:22px;font-family:"Roboto Mono",monospace;color:var(--accent);font-weight:500;margin:12px 0}
.success p{font-size:13px;color:var(--muted);line-height:1.5}
</style>
</head>
<body>
<div id="root"></div>
<div id="menu" class="menu"></div>
<div id="scrim" class="scrim"><div id="modal"></div></div>
<div id="toast"></div>
<script>
/* ============================================================
   EHS DELIVERY DESK  —  concern intake + delivery dashboard
   Single-file vanilla JS. Demo mode = localStorage (no backend).

/* ---------------- Helpers ---------------- */
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uid(p){ return (p||'id')+'_'+Math.random().toString(36).slice(2,9); }
function initials(n){ const p=(n||'?').trim().split(/\s+/); return ((p[0]||'?')[0]+(p[1]?p[1][0]:'')).toUpperCase(); }
function avatarColor(x){ const s=(x&&x.name)||x||''; let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))>>>0; const cs=['#2743E0','#C2410C','#0E8F5A','#7C3AED','#B96A00','#0891B2','#BE185D']; return cs[h%cs.length]; }
function avatar(u,size=22){ const bw=size>=30?1.5:1.25;
  if(!u) return `<span class="avatar rnd" style="width:${size}px;height:${size}px;background:#8A8F9820;border:${bw}px solid #B4B2A9;color:#5F5E5A;font-size:${Math.max(9,Math.round(size*0.4))}px">\u2013</span>`;
  const c=avatarColor(u);
  return `<span class="avatar rnd" style="width:${size}px;height:${size}px;background:${c}20;border:${bw}px solid ${c};color:${c};font-size:${Math.max(9,Math.round(size*0.4))}px">${initials(u.name||u)}</span>`; }
function priIcon(p){ const c=PRIORITIES[p]||'#9BA3AF';
  return `<svg class="pri" viewBox="0 0 14 14" title="${p}"><rect x="1" y="8" width="3" height="5" fill="${c}" opacity="${p==='Low'?1:.45}"/><rect x="5.5" y="4" width="3" height="9" fill="${c}" opacity="${p==='Low'?.3:(p==='Medium'?1:.6)}"/><rect x="10" y="1" width="3" height="12" fill="${c}" opacity="${(p==='High'||p==='Highest')?1:.3}"/></svg>`; }
function cat(id){ return CATEGORIES.find(c=>c.id===id); }
function catBadge(id){ const c=cat(id); if(!c) return ''; return `<span class="badge ${c.cls}"><span class="dot" style="background:${c.color}"></span>${c.name}</span>`; }
function stat(id){ return STATUSES.find(s=>s.id===id)||STATUSES[0]; }
function stBadge(id){ const s=stat(id); return `<span class="st"><span class="dot" style="background:${s.color}"></span>${s.name}</span>`; }
function sevPill(s){ const c=SEVERITIES[s]||'#71717A'; return `<span class="badge" style="color:${c};border-color:${c}44;background:${c}12">${s||'\u2014'}</span>`; }
function typePill(t){ if(!t) return '\u2014'; return `<span class="badge" style="color:var(--ink-2);border-color:var(--line);background:var(--surface-3)">${esc(t)}</span>`; }
function tagChips(tags){ if(!tags||!tags.length) return ''; return tags.map(t=>`<span class="tag">${esc(t)}</span>`).join(''); }
function isOverdue(t){ if(!t.dueDate||t.status==='resolved'||t.status==='closed') return false; return new Date(t.dueDate+'T23:59:59')<new Date(); }
function resolutionDays(t){ if(!t.resolvedAt) return null; return Math.max(0,Math.round((new Date(t.resolvedAt)-new Date(t.createdAt))/864e5*10)/10); }
function teamName(id){ const t=store.data.teams.find(t=>t.id===id); return t?t.name:(id||'\u2014'); }
function fdate(iso){ if(!iso) return '\u2014'; const d=new Date(iso); const day=d.getDate();
  const suf=(day%10===1&&day!==11)?'st':(day%10===2&&day!==12)?'nd':(day%10===3&&day!==13)?'rd':'th';
  const M=["January","February","March","April","May","June","July","August","September","October","November","December"];
  return day+suf+' '+M[d.getMonth()]; }
function fdatetime(iso){ if(!iso) return '\u2014'; const d=new Date(iso); let h=d.getHours(); const m=String(d.getMinutes()).padStart(2,'0'); const ap=h>=12?'PM':'AM'; h=h%12||12; return fdate(iso)+', '+h+':'+m+' '+ap; }
function timeAgo(iso){ const diff=(Date.now()-new Date(iso).getTime())/1000; if(diff<45)return 'just now'; if(diff<3600)return Math.floor(diff/60)+'m ago'; if(diff<86400)return Math.floor(diff/3600)+'h ago'; if(diff<604800)return Math.floor(diff/86400)+'d ago'; return fdate(iso); }
function ageBadge(iso,status){ if(status==='resolved'||status==='closed') return ''; const days=(Date.now()-new Date(iso).getTime())/864e5; const cls=days<2?'fresh':days<5?'warn':'old'; const lbl=days<1?'<1d':Math.floor(days)+'d'; return `<span class="age ${cls}">${lbl} open</span>`; }

  return `<svg class="ico" viewBox="0 0 24 24">${P[name]||''}</svg>`; }
let toastT; function toast(msg,ms){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('on'),ms||2200); }

/* ---------------- Permission gates ---------------- */
function can(perm){ const r=store.myRole(); return !!(r&&r.perms&&r.perms[perm]); }
function myCats(){ const r=store.myRole(); return r?r.categories:[]; }
function canSee(t){ return myCats().includes(t.category); }
function fieldHidden(fid){ const r=store.myRole(); return !!(r&&r.hiddenFields&&r.hiddenFields.includes(fid)); }
function visibleTickets(){ return store.data.tickets.filter(canSee); }

  const u=store.data.users.find(x=>x.email.toLowerCase()===em);
  if(!u||u.pw!==pw){ toast('Invalid email or password'); return; }
  store.session={userId:u.id}; store._sess(); renderApp();
}
function logout(){ store.session=null; store._sess(); renderLogin(); }

function pfPickCat(id){ window._pfCat=id; document.querySelectorAll('#pf_cats .pt').forEach(p=>p.classList.toggle('on',p.dataset.cat===id)); }
function pfAddTag(){ const v=$('pf_tag').value.trim(); if(!v)return; pubTags.push(v); $('pf_tag').value=''; renderPubTags(); }
function renderPubTags(){ const el=$('pf_tags'); if(!el)return; el.innerHTML=pubTags.map((t,i)=>`<span class="pt on" onclick="pubTags.splice(${i},1);renderPubTags()">${esc(t)} \u00d7</span>`).join(''); }
function pfAddLink(){ const v=$('pf_link').value.trim(); if(!v)return; pubLinks.push(v); $('pf_link').value=''; renderPubLinks(); }
function renderPubLinks(){ const el=$('pf_links'); if(!el)return; el.innerHTML=pubLinks.map((l,i)=>`<div class="filerow">${ic('link')}<span style="overflow:hidden;text-overflow:ellipsis">${esc(l)}</span><span class="rm" onclick="pubLinks.splice(${i},1);renderPubLinks()">Remove</span></div>`).join(''); }
function pfAddFiles(files){
  [...files].forEach(f=>{ if(f.size>3*1024*1024){ toast(f.name+' is over 3MB'); return; }
    const r=new FileReader(); r.onload=()=>{ pubFiles.push({name:f.name,type:f.type,data:r.result}); renderPubFiles(); }; r.readAsDataURL(f); });
}
function renderPubFiles(){ const el=$('pf_files'); if(!el)return;
  el.innerHTML=pubFiles.map((f,i)=>`<div class="filerow">${ic('paperclip')}<span>${esc(f.name)}</span><span class="rm" onclick="pubFiles.splice(${i},1);renderPubFiles()">Remove</span></div>`).join(''); }
function _v(id){ const e=$(id); return e?e.value.trim():''; }
function submitPublic(){

  if(!concern||!desc){ toast('Please fill Concern and Details'); return; }
  const name=_v('pf_name');
  if($('pf_name') && !name){ toast('Please enter your name'); return; }
  const s=store.data.settings; const key='DEL-'+String(s.seq).padStart(3,'0'); s.seq++;
  const nowISO=new Date().toISOString();
  const t={ id:'tk_'+key, key, concern, description:desc, category:window._pfCat,
    type:_v('pf_type')||'Other', priority:_v('pf_pri')||'Medium', severity:_v('pf_sev')||'Moderate', tags:pubTags.slice(),
    requesterName:name, requesterEmail:_v('pf_email'), requesterPhone:_v('pf_phone'), department:_v('pf_dept'),
    team:_v('pf_team'), source:'Public form',
    affectedArea:_v('pf_area'), platform:_v('pf_plat')||'Web', environment:_v('pf_env')||'Production',
    stepsToReproduce:_v('pf_steps'), expectedResult:_v('pf_exp'),
    attachments:pubFiles.slice(), referenceLinks:pubLinks.slice(), linkedTickets:[],
    status:'open', assignee:null, reviewer:null, watchers:[], dueDate:'', estimateHours:'', storyPoints:'',
    resolutionNotes:'', internalNotes:'', deployed:false, deployedAt:null, resolvedAt:null, closedAt:null,
    worklogs:[], comments:[], createdAt:nowISO, updatedAt:nowISO,
    activity:[{who:name||'Anonymous',txt:'Ticket created via public intake form',at:nowISO}] };
  store.data.tickets.push(t); store._persist();

/* ---------------- Filtering ---------------- */
function filteredTickets(){
  let list=visibleTickets();
  if(ui.fCat!=='all') list=list.filter(t=>t.category===ui.fCat);
  if(ui.fStatus!=='all') list=list.filter(t=>t.status===ui.fStatus);
  if(ui.fPriority!=='all') list=list.filter(t=>t.priority===ui.fPriority);
  if(ui.fTeam!=='all') list=list.filter(t=>t.team===ui.fTeam);
  if(ui.search){ const q=ui.search.toLowerCase();
    list=list.filter(t=>(t.concern+' '+t.description+' '+t.key+' '+(t.requesterName||'')).toLowerCase().includes(q)); }
  return list.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
}

  </div>`;

function wireToolbar(){ const s=$('tb_search'); if(s){ s.oninput=()=>{ ui.search=s.value; renderTable(); }; } }
function openFilter(e,key,opts){ e.stopPropagation();
  openMenu(e.currentTarget, opts.map(o=>({label:o.l, on:()=>{ ui[key]=o.v; renderMain(); }, active:ui[key]===o.v})));
}
function renderTable(){
  const list=filteredTickets();
  const showAssignee=!fieldHidden('assignee');
  const showTeam=!fieldHidden('team');
  const showReq=!fieldHidden('requesterName');
  let bodyRows='';
  const rowHTML=(t)=>`<tr class="trow" onclick="openTicket('${t.id}')">
      <td class="key">${t.key}</td>
      <td><div class="ttl">${esc(t.concern)}</div>${t.tags&&t.tags.length?`<div style="margin-top:3px">${tagChips(t.tags.slice(0,3))}</div>`:''}</td>
      <td>${catBadge(t.category)}</td>
      <td>${typePill(t.type)}</td>
      <td>${stBadge(t.status)}</td>
      <td>${priIcon(t.priority)} <span style="font-size:11.5px;color:var(--muted)">${t.priority}</span></td>
      <td>${sevPill(t.severity)}</td>
      ${showReq?`<td>${esc(t.requesterName||'\u2014')}</td>`:''}
      ${showTeam?`<td>${esc(teamName(t.team))}</td>`:''}
      ${showAssignee?`<td>${t.assignee?assigneeCell(t.assignee):'<span style="color:var(--faint)">Unassigned</span>'}</td>`:''}
      <td>${t.dueDate?`<span class="${isOverdue(t)?'overdue':''}" style="font-size:11.5px">${fdate(t.dueDate)}</span>`:'<span style="color:var(--faint)">\u2014</span>'}</td>
      <td>${ageBadge(t.createdAt,t.status)||('<span style="font-size:11px;color:var(--faint)">'+timeAgo(t.createdAt)+'</span>')}</td>
    </tr>`;
  if(ui.group==='none'){
    bodyRows=list.map(rowHTML).join('');
  } else {
    const groups={}; list.forEach(t=>{ const k=groupKey(t); (groups[k]=groups[k]||[]).push(t); });
    const colspan=8+(showReq?1:0)+(showTeam?1:0)+(showAssignee?1:0);
    bodyRows=Object.keys(groups).sort().map(k=>`<tr class="grouprow"><td colspan="${colspan}">${esc(k)} \u00b7 ${groups[k].length}</td></tr>`+groups[k].map(rowHTML).join('')).join('');
  }
  const cols=['ID','Concern','Category','Type','Status','Priority','Severity',showReq?'Requester':null,showTeam?'Team':null,showAssignee?'Assignee':null,'Due','Age'].filter(Boolean);
  $('tbl').innerHTML = list.length? `<div class="tablewrap"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${bodyRows}</tbody></table></div>`
    : `<div class="tablewrap"><div class="empty">${ic('inbox')}<div>No tickets match your filters.</div></div></div>`;
}
function groupKey(t){ switch(ui.group){
  case 'category': return cat(t.category).name;
  case 'type': return t.type||'Untyped';
  case 'status': return stat(t.status).name;
  case 'priority': return t.priority;
  case 'severity': return t.severity||'\u2014';
  case 'team': return teamName(t.team);
  case 'assignee': return t.assignee?assigneeName(t.assignee):'Unassigned';
  default: return ''; } }
function assigneeName(id){ const a=store.data.assignees.find(a=>a.id===id); return a?a.name:'\u2014'; }
function assigneeCell(id){ const a=store.data.assignees.find(a=>a.id===id); if(!a) return '\u2014'; return `<span style="display:inline-flex;align-items:center;gap:7px">${avatar(a,20)}<span style="font-size:12px">${esc(a.name)}</span></span>`; }

/* ============================================================
   REPORT / ANALYTICS
   ============================================================ */
function barChart(rows, opts){ // rows: [{label,value,color}]
  opts=opts||{}; const max=Math.max(1,...rows.map(r=>r.value));
  return rows.map(r=>`<div class="barrow"><div class="lab" title="${esc(r.label)}">${esc(r.label)}</div>
    <div class="bartrack"><div class="barfill" style="width:${(r.value/max*100).toFixed(1)}%;background:${r.color||'var(--accent)'}"></div></div>
    <div class="val num">${r.value}</div></div>`).join('')||'<div class="hint">No data</div>';
}
function donut(rows){ // rows:[{label,value,color}]
  const total=rows.reduce((s,r)=>s+r.value,0)||1; let acc=0; const R=52,C=2*Math.PI*R;
  const segs=rows.filter(r=>r.value>0).map(r=>{ const frac=r.value/total; const dash=frac*C;
    const el=`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${r.color}" stroke-width="20" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${-acc*C}" transform="rotate(-90 70 70)"/>`;
    acc+=frac; return el; }).join('');
  return `<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
    <svg width="140" height="140" viewBox="0 0 140 140" style="flex:none">
      <circle r="52" cx="70" cy="70" fill="none" stroke="var(--surface-3)" stroke-width="20"/>
      ${segs}<text x="70" y="66" text-anchor="middle" font-size="24" font-weight="800" fill="var(--ink)">${total}</text>

}
function trendChart(created, resolved, labels){
  const W=560,H=140,pad=24; const max=Math.max(1,...created,...resolved);
  const x=i=>pad+i*((W-pad*2)/Math.max(1,labels.length-1));
  const y=v=>H-pad-(v/max)*(H-pad*2);
  const path=(arr)=>arr.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
  const area=(arr,col)=>`<path d="${path(arr)} L${x(arr.length-1)} ${H-pad} L${x(0)} ${H-pad} Z" fill="${col}" opacity=".08"/>`;
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="var(--line)"/>
    ${area(created,'#3B6FE0')}${area(resolved,'#0E8F5A')}
    <path d="${path(created)}" fill="none" stroke="#3B6FE0" stroke-width="2"/>
    <path d="${path(resolved)}" fill="none" stroke="#0E8F5A" stroke-width="2"/>
    ${labels.map((l,i)=>i%Math.ceil(labels.length/7)===0?`<text x="${x(i)}" y="${H-8}" font-size="9" fill="var(--muted)" text-anchor="middle">${l}</text>`:'').join('')}
  </svg>
  <div class="legend"><span><span class="dot" style="background:#3B6FE0"></span>Created</span><span><span class="dot" style="background:#0E8F5A"></span>Resolved</span></div>`;
}
function countBy(list, keyFn){ const m={}; list.forEach(t=>{ const k=keyFn(t); if(k==null||k==='')return; m[k]=(m[k]||0)+1; }); return m; }
function renderReport(){
  const vt=visibleTickets();
  const active=vt.filter(t=>t.status!=='resolved'&&t.status!=='closed');
  const resolved=vt.filter(t=>t.resolvedAt);
  const overdue=vt.filter(isOverdue);
  const unassigned=active.filter(t=>!t.assignee);
  const avgRes=resolved.length? (resolved.reduce((s,t)=>s+resolutionDays(t),0)/resolved.length).toFixed(1) : '\u2014';
  const avgAge=active.length? (active.reduce((s,t)=>s+(Date.now()-new Date(t.createdAt))/864e5,0)/active.length).toFixed(1) : '0';

  const byStatus=STATUSES.map(s=>({label:s.name,value:vt.filter(t=>t.status===s.id).length,color:s.color}));
  const byCat=CATEGORIES.filter(c=>myCats().includes(c.id)).map(c=>({label:c.name,value:vt.filter(t=>t.category===c.id).length,color:c.color}));
  const byPri=PRI_ORDER.map(p=>({label:p,value:vt.filter(t=>t.priority===p).length,color:PRIORITIES[p]}));
  const bySev=SEV_ORDER.map(p=>({label:p,value:vt.filter(t=>t.severity===p).length,color:SEVERITIES[p]}));
  const typeCounts=countBy(vt,t=>t.type); const byType=Object.keys(typeCounts).map(k=>({label:k,value:typeCounts[k],color:'var(--accent)'})).sort((a,b)=>b.value-a.value);
  const teamCounts=countBy(vt,t=>teamName(t.team)); const byTeam=Object.keys(teamCounts).map(k=>({label:k,value:teamCounts[k],color:'#7C3AED'})).sort((a,b)=>b.value-a.value);
  const workload=store.data.assignees.filter(a=>myCats().includes(a.cat)).map(a=>({label:a.name,value:active.filter(t=>t.assignee===a.id).length,color:avatarColor(a)})).sort((a,b)=>b.value-a.value);
  const reqCounts=countBy(vt,t=>t.requesterName||null); const byReq=Object.keys(reqCounts).map(k=>({label:k,value:reqCounts[k],color:'#0891B2'})).sort((a,b)=>b.value-a.value).slice(0,6);
  const buckets=[['0\u20132 days',0,2],['3\u20135 days',3,5],['6\u201310 days',6,10],['10+ days',11,999]];
  const byAge=buckets.map(([lab,lo,hi])=>({label:lab,value:active.filter(t=>{const d=(Date.now()-new Date(t.createdAt))/864e5;return d>=lo&&d<=hi;}).length,color:lo<3?'#0E8F5A':lo<6?'#B96A00':'#CE2F26'}));

  const days=14, labels=[], created=[], resolvedArr=[];
  for(let i=days-1;i>=0;i--){ const d=new Date(Date.now()-i*864e5); const key=d.toISOString().slice(0,10);
    labels.push(d.getDate()+'/'+(d.getMonth()+1));
    created.push(vt.filter(t=>t.createdAt.slice(0,10)===key).length);
    resolvedArr.push(vt.filter(t=>t.resolvedAt&&t.resolvedAt.slice(0,10)===key).length); }

  $('mainview').innerHTML=`
    <div class="phead"><div><h1>Reports</h1><div class="sub">${myCats().map(c=>cat(c).name).join(' + ')} \u2014 analytics across ${vt.length} ticket${vt.length!==1?'s':''}</div></div>
      <div class="spacer"></div><button class="btn ghost" onclick="exportCSV()">${ic('download')} Export data</button></div>
    <div class="kpis">
      <div class="kpi"><div class="n num">${vt.length}</div><div class="l">Total tickets</div><div class="d">${active.length} active</div></div>
      <div class="kpi"><div class="n num" style="color:var(--good)">${resolved.length}</div><div class="l">Resolved</div><div class="d">${vt.length?Math.round(resolved.length/vt.length*100):0}% resolution rate</div></div>
      <div class="kpi"><div class="n num">${avgRes}</div><div class="l">Avg resolution</div><div class="d">days to resolve</div></div>

      <div class="kpi"><div class="n num" style="color:var(--warn)">${unassigned.length}</div><div class="l">Unassigned</div><div class="d">need an owner</div></div>
    </div>
    <div class="rcard" style="margin-bottom:16px"><h4>${ic('chart')} Volume trend <span class="sub">last 14 days</span></h4>${trendChart(created,resolvedArr,labels)}</div>

      <div class="rcard"><h4>Status breakdown</h4>${donut(byStatus)}</div>
      <div class="rcard"><h4>Category split</h4>${donut(byCat)}</div>
      <div class="rcard"><h4>By priority</h4>${barChart(byPri)}</div>
      <div class="rcard"><h4>By severity</h4>${barChart(bySev)}</div>
      <div class="rcard"><h4>By type</h4>${barChart(byType)}</div>

      <div class="rcard"><h4>By requesting team</h4>${barChart(byTeam)}</div>
      <div class="rcard"><h4>Team workload <span class="sub">active</span></h4>${barChart(workload)}</div>
    </div>
    <div class="rcard" style="margin-top:16px"><h4>Top requesters</h4>${barChart(byReq)}</div>`;
}

function selField(opts,cur,fn){

function logAct(t,txt){ t.activity=t.activity||[]; t.activity.push({who:store.me().name,txt,at:new Date().toISOString()}); t.updatedAt=new Date().toISOString(); }
// generic field setter
const FIELD_LABELS={type:'type',severity:'severity',platform:'platform',environment:'environment',reviewer:'reviewer',dueDate:'due date',estimateHours:'estimate',storyPoints:'story points',affectedArea:'affected area',resolutionNotes:'resolution notes',internalNotes:'internal notes',description:'description',concern:'title',expectedResult:'expected outcome',stepsToReproduce:'steps'};
function setField(field,value){ const t=curTicket; t[field]=value; logAct(t,`updated ${FIELD_LABELS[field]||field}`); store._persist(); if(['concern'].includes(field))drawTicket(); else t.updatedAt=new Date().toISOString(); renderSide(); }

function setField_type(v){ setField('type',v); drawTicket(); }
function setField_severity(v){ setField('severity',v); drawTicket(); }
function setField_platform(v){ setField('platform',v); }
function setField_environment(v){ setField('environment',v); }

function addTag(v){ v=(v||'').trim(); if(!v)return; curTicket.tags=curTicket.tags||[]; if(!curTicket.tags.includes(v))curTicket.tags.push(v); logAct(curTicket,`added tag "${v}"`); store._persist(); drawTicket(); }
function setTicketStatus(v){ const t=curTicket; const old=stat(t.status).name; t.status=v; const done=(v==='resolved'||v==='closed');
  if(done && !t.resolvedAt) t.resolvedAt=new Date().toISOString();
  if(v==='closed') t.closedAt=new Date().toISOString();
  if(!done){ t.resolvedAt=null; t.closedAt=null; }
  if(done){ t.deployed=true; t.deployedAt=t.deployedAt||new Date().toISOString(); }
  logAct(t,`changed status \u2192 ${stat(v).name} (was ${old})`); store._persist(); drawTicket(); renderSide(); toast('Status updated'); }
function setTicketPriority(v){ const t=curTicket; t.priority=v; logAct(t,`set priority \u2192 ${v}`); store._persist(); drawTicket(); }
function setTicketCat(v){ const t=curTicket; t.category=v; if(t.assignee){ const a=store.data.assignees.find(a=>a.id===t.assignee); if(!a||a.cat!==v){ t.assignee=null; } } if(t.reviewer){ const a=store.data.assignees.find(a=>a.id===t.reviewer); if(!a||a.cat!==v){ t.reviewer=null; } } logAct(t,`moved to ${cat(v).name} team`); store._persist(); drawTicket(); }
function setTicketAssignee(v){ const t=curTicket; t.assignee=v||null; logAct(t, v?`assigned to ${assigneeName(v)}`:'unassigned'); store._persist(); drawTicket(); renderMain(); }
function addComment(){ const el=$('cmtInput'); const txt=el.value.trim(); if(!txt)return; curTicket.comments=curTicket.comments||[]; curTicket.comments.push({who:store.me().name,text:txt,at:new Date().toISOString()}); logAct(curTicket,'commented'); store._persist(); drawTicket(); }
function addWorklog(){ const h=parseFloat($('wl_hours').value); if(!h||h<=0){ toast('Enter hours'); return; } const note=$('wl_note').value.trim(); curTicket.worklogs=curTicket.worklogs||[]; curTicket.worklogs.push({who:store.me().name,hours:h,note,at:new Date().toISOString()}); logAct(curTicket,`logged ${h}h`); store._persist(); drawTicket(); toast('Time logged'); }
function deleteTicket(){ if(!confirm('Delete '+curTicket.key+'? This cannot be undone.'))return; store.data.tickets=store.data.tickets.filter(t=>t.id!==curTicket.id); store._persist(); closeModal(); renderMain(); renderSide(); toast('Ticket deleted'); }
function closeModal(){ $('scrim').classList.remove('on'); curTicket=null; ui.dtab='details'; }

/* ============================================================
   USERS & ROLES
   ============================================================ */
function renderUsers(){
  $('mainview').innerHTML=`
    <div class="phead"><div><h1>Users & Roles</h1><div class="sub">Create profiles, scope them to categories, and grant read/write access</div></div>
      <div class="spacer"></div>
      <button class="btn ghost" onclick="editRole()">${ic('shield')} New role</button>
      <button class="btn accent" onclick="editUser()">${ic('plus')} New user</button></div>
    <h3 style="font-size:13px;margin:6px 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Users</h3>
    <div class="tablewrap"><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Categories</th><th>Access</th><th></th></tr></thead><tbody>
      ${store.data.users.map(u=>{ const r=store.role(u.roleId); const perms=r?PERMS.filter(p=>r.perms[p.id]).length:0;
        return `<tr><td><span style="display:inline-flex;align-items:center;gap:8px">${avatar(u,22)}${esc(u.name)}</span></td>
          <td style="color:var(--muted)">${esc(u.email)}</td>
          <td>${esc(r?r.name:'\u2014')}</td>
          <td>${r?r.categories.map(c=>catBadge(c)).join(' '):''}</td>
          <td><span class="hint">${r&&r.perms.editFields?'Read + Write':'Read only'} \u00b7 ${perms} caps</span></td>
          <td><button class="btn ghost" style="padding:5px 10px" onclick="editUser('${u.id}')">Edit</button></td></tr>`;}).join('')}
    </tbody></table></div>
    <h3 style="font-size:13px;margin:22px 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Roles / Profiles</h3>
    <div class="tablewrap"><table><thead><tr><th>Role</th><th>Categories</th><th>Capabilities</th><th>Hidden fields</th><th></th></tr></thead><tbody>
      ${store.data.roles.map(r=>`<tr><td><b>${esc(r.name)}</b>${r.system?' <span class="hint">(system)</span>':''}</td>
          <td>${r.categories.map(c=>catBadge(c)).join(' ')||'<span class="hint">none</span>'}</td>
          <td><span class="hint">${PERMS.filter(p=>r.perms[p.id]).map(p=>p.label).join(', ')||'none'}</span></td>
          <td><span class="hint">${r.hiddenFields&&r.hiddenFields.length?r.hiddenFields.map(f=>{const F=FIELDS.find(x=>x.id===f);return F?F.label:f;}).join(', '):'\u2014'}</span></td>
          <td><button class="btn ghost" style="padding:5px 10px" onclick="editRole('${r.id}')">Edit</button></td></tr>`).join('')}
    </tbody></table></div>`;
}
function editUser(id){
  const u=id?store.user(id):null;
  $('modal').className='modal sm';
  $('modal').innerHTML=`
    <div class="mhead"><h3>${u?'Edit user':'New user'}</h3><div class="x" onclick="closeModal()">${ic('x')}</div></div>
    <div class="mbody">
      <div class="field"><label>Full name</label><input id="u_name" type="text" value="${u?esc(u.name):''}"></div>
      <div class="field"><label>Email</label><input id="u_email" type="email" value="${u?esc(u.email):''}"></div>
      <div class="field"><label>${u?'Reset password (optional)':'Temporary password'}</label><input id="u_pw" type="text" placeholder="${u?'leave blank to keep':'set a password'}"></div>
      <div class="field"><label>Role / profile</label>
        <select id="u_role">${store.data.roles.map(r=>`<option value="${r.id}" ${u&&u.roleId===r.id?'selected':''}>${esc(r.name)}</option>`).join('')}</select>
        <div class="hint">The role decides which categories they see and whether they can write.</div></div>
    </div>
    <div class="mfoot">${u&&!['u_admin'].includes(u.id)?`<button class="btn ghost" style="color:var(--crit);border-color:#f0c8c5" onclick="delUser('${u.id}')">Delete</button>`:''}
      <div class="spacer" style="flex:1"></div>
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn accent" onclick="saveUser('${id||''}')">${u?'Save':'Create user'}</button></div>`;
  $('scrim').classList.add('on');
}
function saveUser(id){
  const name=$('u_name').value.trim(), email=$('u_email').value.trim(), pw=$('u_pw').value, roleId=$('u_role').value;
  if(!name||!email){ toast('Name and email required'); return; }
  if(id){ const u=store.user(id); u.name=name; u.email=email; u.roleId=roleId; if(pw)u.pw=pw; }
  else { if(!pw){ toast('Set a temporary password'); return; }
    if(store.data.users.some(x=>x.email.toLowerCase()===email.toLowerCase())){ toast('Email already exists'); return; }
    store.data.users.push({id:uid('u'),name,email,pw,roleId}); }
  store._persist(); closeModal(); renderUsers(); toast('User saved');
}
function delUser(id){ if(!confirm('Delete this user?'))return; store.data.users=store.data.users.filter(u=>u.id!==id); store._persist(); closeModal(); renderUsers(); toast('User deleted'); }

function editRole(id){
  const r=id?store.role(id):{name:'',categories:[],perms:allPerms(false),hiddenFields:[]};
  $('modal').className='modal md';
  $('modal').innerHTML=`
    <div class="mhead"><h3>${id?'Edit role':'New role / profile'}</h3><div class="x" onclick="closeModal()">${ic('x')}</div></div>
    <div class="mbody">
      <div class="field"><label>Role name</label><input id="r_name" type="text" value="${esc(r.name)}" placeholder="e.g. Creative Supervisor"></div>
      <div class="field"><label>Category access <span class="hint">\u2014 which tickets this role can see</span></label>
        <div class="pills" id="r_cats">${CATEGORIES.map(c=>`<div class="pt ${r.categories.includes(c.id)?'on':''}" data-cat="${c.id}" onclick="this.classList.toggle('on')">${c.name}</div>`).join('')}</div></div>
      <div class="field"><label>Capabilities <span class="hint">\u2014 what this role can do</span></label>
        <div class="checkgrid" id="r_perms">${PERMS.map(p=>`<label class="checkrow"><input type="checkbox" data-perm="${p.id}" ${r.perms[p.id]?'checked':''}><span><div>${p.label}</div><div class="d">${p.d}</div></span></label>`).join('')}</div></div>
      <div class="field"><label>Field-level security <span class="hint">\u2014 hide these fields from this role (enforced in views)</span></label>
        <div class="checkgrid" id="r_hidden">${FIELDS.filter(f=>!f.core).map(f=>`<label class="checkrow"><input type="checkbox" data-field="${f.id}" ${r.hiddenFields&&r.hiddenFields.includes(f.id)?'checked':''}><span>${f.label}</span></label>`).join('')}</div></div>
    </div>
    <div class="mfoot">${id&&!r.system?`<button class="btn ghost" style="color:var(--crit);border-color:#f0c8c5" onclick="delRole('${id}')">Delete</button>`:''}
      <div class="spacer" style="flex:1"></div>
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn accent" onclick="saveRole('${id||''}')">${id?'Save role':'Create role'}</button></div>`;
  $('scrim').classList.add('on');
}
function saveRole(id){
  const name=$('r_name').value.trim(); if(!name){ toast('Role name required'); return; }
  const categories=[...document.querySelectorAll('#r_cats .pt.on')].map(p=>p.dataset.cat);
  const perms={}; PERMS.forEach(p=>perms[p.id]=false);
  document.querySelectorAll('#r_perms input:checked').forEach(i=>perms[i.dataset.perm]=true);
  const hiddenFields=[...document.querySelectorAll('#r_hidden input:checked')].map(i=>i.dataset.field);
  if(id){ const r=store.role(id); r.name=name; r.categories=categories; r.perms=perms; r.hiddenFields=hiddenFields; }
  else store.data.roles.push({id:uid('r'),name,categories,perms,hiddenFields});
  store._persist(); closeModal(); renderUsers(); toast('Role saved');
}
function delRole(id){ if(store.data.users.some(u=>u.roleId===id)){ toast('Reassign users on this role first'); return; } if(!confirm('Delete this role?'))return; store.data.roles=store.data.roles.filter(r=>r.id!==id); store._persist(); closeModal(); renderUsers(); toast('Role deleted'); }

/* ============================================================
   INTAKE FORM BUILDER
   ============================================================ */

             ['Context',[['affectedArea','Affected page / area'],['platform','Platform'],['environment','Environment'],['stepsToReproduce','Steps to reproduce'],['expectedResult','Expected outcome']]],

              ${rows.map(([k,l])=>`<div class="checkrow" style="border:0;border-bottom:1px solid var(--line-2);padding:7px 4px"><span>${l}</span><div class="spacer" style="flex:1"></div><div class="sw ${ff[k]?'on':''}" onclick="toggleField('${k}',this)"></div></div>`).join('')}

        </div>

          <label style="font-size:11.5px;font-weight:700;color:var(--ink-2)">Teams (Requested by options)</label>

            ${store.data.teams.map(t=>`<div class="filerow"><span>${esc(t.name)}</span><span class="rm" onclick="delTeam('${t.id}')">Remove</span></div>`).join('')}

function saveFormText(){ store.data.settings.formTitle=$('fb_title').value; store.data.settings.formIntro=$('fb_intro').value; store._persist(); toast('Form text saved'); }
function toggleField(k,el){ store.data.settings.formFields[k]=!store.data.settings.formFields[k]; el.classList.toggle('on'); store._persist(); }
function addTeam(){ const v=$('fb_team').value.trim(); if(!v)return; store.data.teams.push({id:uid('t'),name:v}); store._persist(); renderFormBuilder(); }
function delTeam(id){ store.data.teams=store.data.teams.filter(t=>t.id!==id); store._persist(); renderFormBuilder(); }
function copyLink(l){ navigator.clipboard&&navigator.clipboard.writeText(l); toast('Link copied'); }

/* ---------------- Export ---------------- */
function exportCSV(){
  const list=filteredTickets();
  const cols=['key','concern','category','type','status','priority','severity','tags','requesterName','requesterEmail','requesterPhone','department','team','source','affectedArea','platform','environment','assignee','reviewer','dueDate','estimateHours','storyPoints','createdAt','resolvedAt'];
  const cell=(t,c)=>{ switch(c){
    case 'team': return teamName(t.team); case 'category': return cat(t.category).name; case 'status': return stat(t.status).name;
    case 'tags': return (t.tags||[]).join('; '); case 'assignee': return assigneeName(t.assignee); case 'reviewer': return t.reviewer?assigneeName(t.reviewer):'';
    default: return t[c]; } };
  const rows=[cols.join(',')].concat(list.map(t=>cols.map(c=>'"'+String(cell(t,c)==null?'':cell(t,c)).replace(/"/g,'""')+'"').join(',')));
  const blob=new Blob([rows.join('\n')],{type:'text/csv'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='delivery-tickets.csv'; a.click(); toast('Exported CSV');
}

/* ============================================================
   SETTINGS — delivery team, types, sources, data
   ============================================================ */
function listEditor(title, hint, items, addFn, delFn, inputId){
  return `<div class="stat" style="padding:16px 18px">
    <label style="font-size:11.5px;font-weight:700;color:var(--ink-2)">${title}</label>
    <div class="hint" style="margin:4px 0 10px">${hint}</div>
    <div class="filelist">${items.map(it=>`<div class="filerow"><span>${esc(it.label)}</span><span class="rm" onclick="${delFn}('${esc(it.id)}')">Remove</span></div>`).join('')||'<div class="hint">None yet</div>'}</div>
    <div style="display:flex;gap:8px;margin-top:10px"><input class="inp" id="${inputId}" placeholder="Add\u2026" onkeydown="if(event.key==='Enter')${addFn}()"><button class="btn ghost" onclick="${addFn}()">Add</button></div>
  </div>`;
}
function renderSettings(){
  const asgn=store.data.assignees.map(a=>({id:a.id,label:a.name+' \u2014 '+cat(a.cat).name}));
  const types=store.data.types.map(t=>({id:t,label:t}));
  const sources=store.data.sources.map(s=>({id:s,label:s}));
  $('mainview').innerHTML=`
    <div class="phead"><div><h1>Settings</h1><div class="sub">Delivery team, concern types, sources, and data</div></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
      <div class="stat" style="padding:16px 18px">
        <label style="font-size:11.5px;font-weight:700;color:var(--ink-2)">Delivery team (assignees)</label>
        <div class="hint" style="margin:4px 0 10px">People that tickets can be assigned to, scoped by category.</div>
        <div class="filelist">${store.data.assignees.map(a=>`<div class="filerow">${avatar(a,20)}<span>${esc(a.name)}</span>${catBadge(a.cat)}<span class="rm" style="margin-left:auto" onclick="delAssignee('${a.id}')">Remove</span></div>`).join('')}</div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <input class="inp" id="as_name" placeholder="Name">
          <select class="inp" id="as_cat" style="width:140px">${CATEGORIES.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>
          <button class="btn ghost" onclick="addAssignee()">Add</button></div>
      </div>
      ${listEditor('Concern types','Sub-classification available on tickets & the form.',types,'addType','delType','st_type')}
      ${listEditor('Sources / channels','How a concern reached you.',sources,'addSource','delSource','st_source')}
      <div class="stat" style="padding:16px 18px">
        <label style="font-size:11.5px;font-weight:700;color:var(--ink-2)">Data</label>
        <div class="hint" style="margin:4px 0 10px">Export a full backup or reset the demo data.</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn ghost" style="justify-content:center" onclick="exportJSON()">${ic('download')} Export all data (JSON)</button>
          <button class="btn ghost" style="justify-content:center" onclick="exportCSV()">${ic('download')} Export tickets (CSV)</button>
          <button class="btn ghost" style="justify-content:center;color:var(--crit);border-color:#f0c8c5" onclick="resetData()">${ic('trash')} Reset all demo data</button>
        </div>
        <div class="hint" style="margin-top:10px">${store.data.tickets.length} tickets \u00b7 ${store.data.users.length} users \u00b7 ${store.data.roles.length} roles</div>
      </div>
    </div>`;
}
function addAssignee(){ const n=$('as_name').value.trim(), c=$('as_cat').value; if(!n)return; store.data.assignees.push({id:uid('a'),name:n,cat:c}); store._persist(); renderSettings(); }
function delAssignee(id){ store.data.assignees.forEach(()=>{}); store.data.tickets.forEach(t=>{ if(t.assignee===id)t.assignee=null; if(t.reviewer===id)t.reviewer=null; }); store.data.assignees=store.data.assignees.filter(a=>a.id!==id); store._persist(); renderSettings(); }
function addType(){ const v=$('st_type').value.trim(); if(!v||store.data.types.includes(v))return; store.data.types.push(v); store._persist(); renderSettings(); }
function delType(v){ store.data.types=store.data.types.filter(t=>t!==v); store._persist(); renderSettings(); }
function addSource(){ const v=$('st_source').value.trim(); if(!v||store.data.sources.includes(v))return; store.data.sources.push(v); store._persist(); renderSettings(); }
function delSource(v){ store.data.sources=store.data.sources.filter(s=>s!==v); store._persist(); renderSettings(); }
function exportJSON(){ const blob=new Blob([JSON.stringify(store.data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='delivery-desk-backup.json'; a.click(); toast('Exported JSON'); }
function resetData(){ if(!confirm('Reset ALL data back to the seeded demo? This wipes your changes.'))return; localStorage.removeItem(KEY); store.data=null; store.seed(); renderApp(); toast('Data reset'); }

/* ---------------- Generic menu ---------------- */
function openMenu(anchor,items){
  const m=$('menu'); m.innerHTML=items.map((it,i)=>`<button data-i="${i}" class="${it.active?'on':''}">${it.icon?ic(it.icon):''}${esc(it.label)}</button>`).join('');
  const r=anchor.getBoundingClientRect(); m.style.left=r.left+'px'; m.style.top=(r.bottom+4)+'px'; m.classList.add('on');
  m.querySelectorAll('button').forEach((b,i)=>b.onclick=(e)=>{ e.stopPropagation(); m.classList.remove('on'); items[i].on&&items[i].on(); });
  setTimeout(()=>{ const rr=m.getBoundingClientRect(); if(rr.right>innerWidth-8) m.style.left=(innerWidth-rr.width-8)+'px'; },0);
}
document.addEventListener('click',()=>$('menu').classList.remove('on'));
$('scrim').addEventListener('click',e=>{ if(e.target===$('scrim')) closeModal(); });

boot();
</script>
