<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHS Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F5F3;--surface:#FFFFFF;--surface-2:#FBFAF8;--surface-3:#F0EEEA;
  --ink:#14161A;--ink-2:#3A3F47;--muted:#6B7280;--faint:#9AA1AC;
  --line:#E4E1DB;--line-2:#EEECE7;
  --accent:#3B6FE0;--accent-ink:#2743E0;
  --navy:#101A33;--navy-2:#1B294B;--navy-line:#2C3B60;
  --good:#0E8F5A;--warn:#B96A00;--crit:#CE2F26;
  --shadow-sm:2px 2px 0 rgba(16,26,51,.05);--shadow:4px 4px 0 rgba(16,26,51,.09);
  --shadow-lg:7px 7px 0 rgba(16,26,51,.12);
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:0;background:none}
input,select{font-family:inherit}
.mono{font-family:var(--mono)}
.num{font-variant-numeric:tabular-nums}

.code-tile{display:inline-grid;place-items:center;font-family:var(--mono);font-weight:700;
  letter-spacing:-.02em;color:#fff;flex:none;line-height:1}
.btn{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
  padding:9px 15px;border:1px solid var(--line);background:var(--surface);color:var(--ink);
  transition:transform .1s,box-shadow .1s,background .12s}
.btn:hover{background:var(--surface-2)}
.btn.accent{background:#fff;color:var(--ink);border:1.6px solid var(--ink);font-weight:700;
  box-shadow:3px 3px 0 var(--accent)}
.btn.accent:hover{background:#fff;transform:translate(1px,1px);box-shadow:2px 2px 0 var(--accent)}
.btn.accent:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--accent)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.accent.sm{box-shadow:2px 2px 0 var(--accent)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn .ico{width:15px;height:15px}
.ico{width:16px;height:16px;flex:none;stroke:currentColor;stroke-width:1.75;fill:none;
  stroke-linecap:round;stroke-linejoin:round;vertical-align:middle}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;
  font-weight:600;letter-spacing:.02em;padding:3px 8px;border:1px solid var(--line);color:var(--muted);
  text-transform:uppercase}
.chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.chip.live{color:var(--good);border-color:#bfe3d0}
.chip.planned{color:var(--faint);border-color:var(--line)}
.chip.master{color:var(--accent);border-color:#bcd0f5}
.eyebrow{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:var(--faint)}

/* ---------- LOGIN (full image, form in the open right space) ---------- */
.login{position:relative;min-height:100vh;background:#FBF9FD;overflow:hidden}
.brand{position:absolute;inset:0;background:#FBF9FD center/cover no-repeat;background-image:url('images/login-bg.webp')}
.corner-logo{position:absolute;top:26px;right:40px;z-index:5;height:26px;filter:grayscale(1) brightness(.2)}
.formside{position:absolute;right:0;top:0;bottom:0;width:42%;min-width:360px;
  display:flex;align-items:center;justify-content:center;padding:0 5%;z-index:4}
.formcard{width:100%;max-width:338px}
.formcard h2{font-size:23px;font-weight:800;letter-spacing:-.02em}
.formcard .sub{color:var(--muted);margin-top:6px;margin-bottom:26px;font-size:13.5px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 13px;border:1px solid var(--line);background:var(--surface);
  font-size:14px;outline:none;transition:border-color .12s,box-shadow .12s}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,111,224,.13)}
.signin{width:100%;justify-content:center;padding:12px;margin-top:6px}
.formfoot{margin-top:22px;font-size:12px;color:var(--faint);text-align:center}
.err{background:#fdeceb;border:1px solid #f4c9c6;color:#9a2820;font-size:12.5px;padding:9px 12px;margin-bottom:14px}
@media(max-width:820px){.formside{width:100%;min-width:0;background:rgba(251,249,253,.94);padding:0 24px}
  .corner-logo{right:auto;left:24px}}

/* ---------- APP SHELL ---------- */
.shell{min-height:100vh;display:flex;flex-direction:column}
.home-grid{background:
  linear-gradient(rgba(16,26,51,.06) 1px,transparent 1px) 0 0/44px 44px,
  linear-gradient(90deg,rgba(16,26,51,.06) 1px,transparent 1px) 0 0/44px 44px,
  var(--bg)}
.topbar{height:60px;background:var(--surface);border-bottom:2px solid var(--ink);
  display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:40}
.tb-brand{display:flex;align-items:center;gap:11px;cursor:pointer}
.tb-brand img{height:24px;filter:brightness(0)}
.tb-div{width:1px;height:24px;background:var(--line);flex:none}
.tb-wf{font-weight:700;font-size:17px;letter-spacing:-.01em;color:var(--ink)}
.tb-id{display:flex;flex-direction:column;justify-content:center;padding-left:15px;margin-left:3px;border-left:1px solid var(--line);cursor:pointer}
.tb-title{font-weight:700;font-size:15px;letter-spacing:-.01em;line-height:1.15}
.tb-sub{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.av-sq{display:grid;place-items:center;font-family:'Inter',sans-serif;font-weight:600;flex:none;box-sizing:border-box}
.tb-crumb{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);
  padding-left:16px;margin-left:2px;border-left:1px solid var(--line)}
.tb-crumb .code-tile{width:24px;height:24px;font-size:9.5px}
.tb-crumb b{color:var(--ink);font-weight:600}
.tb-crumb .sep{color:var(--faint)}
.tb-spacer{flex:1}
.tb-link{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--ink-2);
  padding:7px 11px;border:1px solid var(--line);transition:background .12s}
.tb-link:hover{background:var(--surface-3)}
.tb-link.on{border-color:var(--accent);color:var(--accent)}
.tb-acct{display:flex;align-items:center;gap:9px;padding:6px 8px;cursor:pointer;transition:background .12s}
.tb-acct:hover{background:var(--surface-3)}
.tb-acct .av-sq{width:30px;height:30px;font-size:11px}
.tb-acct .who{font-weight:600;font-size:12.5px;line-height:1.2}
.tb-acct .role{font-size:11px;color:var(--muted)}
.page{flex:1;padding:34px 24px 60px;max-width:1080px;width:100%;margin:0 auto}

/* home */
.home-head{margin-bottom:28px}
.home-head .eyebrow{margin-bottom:12px}
.home-head h1{font-size:30px;font-weight:800;letter-spacing:-.03em}
.home-head p{color:var(--muted);margin-top:8px;font-size:14.5px}
.tool-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.tool-card{background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-sm);
  padding:22px;display:flex;flex-direction:column;gap:14px;cursor:pointer;
  transition:transform .14s,box-shadow .14s}
.tool-card:hover{transform:translate(-3px,-3px);box-shadow:var(--shadow-lg)}
.tc-top{display:flex;align-items:flex-start;gap:14px}
.tc-top .code-tile{width:48px;height:48px;font-size:16px;box-shadow:var(--shadow-sm)}
.tc-name{font-size:17px;font-weight:700;letter-spacing:-.01em}
.tc-tag{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px;
  text-transform:uppercase;letter-spacing:.03em}
.tc-desc{font-size:13.5px;color:var(--ink-2);line-height:1.55;flex:1}
.tc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.tc-open{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--accent)}
.tool-card:hover .tc-open .ico{transform:translateX(2px)}
.tc-open .ico{width:15px;height:15px;transition:transform .14s}
.tc-role{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint)}
.emptytools{border:1px dashed var(--line);background:var(--surface-2);padding:48px 30px;text-align:center;
  color:var(--muted);font-size:14px}

.hs-hero-scrim{position:absolute;inset:0;background:linear-gradient(90deg,rgba(247,248,250,.94),rgba(247,248,250,.5) 42%,transparent 72%),linear-gradient(180deg,transparent 56%,var(--bg))}
.hs-hero-grid{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(rgba(16,26,51,.07) 1px,transparent 1px) 0 0/44px 44px,
    linear-gradient(90deg,rgba(16,26,51,.07) 1px,transparent 1px) 0 0/44px 44px;
  -webkit-mask-image:linear-gradient(180deg,transparent 42%,#000 94%);mask-image:linear-gradient(180deg,transparent 42%,#000 94%)}
.hs-hero-in{position:relative;z-index:2;max-width:1140px;width:100%;margin:0 auto;padding:0 40px;color:var(--ink)}
.hs-hero-h{font-size:54px;line-height:1.03;font-weight:800;letter-spacing:-.035em;max-width:none;color:var(--ink)}
.hs-accent{color:var(--accent)}
.hs-hero-p{color:var(--muted);font-size:18px;margin-top:18px;max-width:44ch;line-height:1.55}
.hs-rotator{height:1.3em;overflow:hidden;margin-top:16px;font-size:31px;font-weight:800;letter-spacing:-.02em;color:var(--accent)}
.hs-rot-list{display:flex;flex-direction:column;animation:rotWords 9s cubic-bezier(.72,0,.28,1) infinite}
.hs-rot-list span{height:1.3em;line-height:1.3em;display:block;white-space:nowrap}
@keyframes rotWords{
  0%,20%{transform:translateY(0)}
  25%,45%{transform:translateY(-20%)}
  50%,70%{transform:translateY(-40%)}
  75%,95%{transform:translateY(-60%)}
  100%{transform:translateY(-80%)}
}
.hs-hero-cta{display:inline-flex;align-items:center;gap:9px;margin-top:26px;background:#fff;color:var(--ink);
  font-size:15px;font-weight:700;padding:14px 26px;border:1.7px solid var(--ink);border-radius:12px;cursor:pointer;font-family:inherit;
  box-shadow:4px 4px 0 var(--accent);transition:transform .1s,box-shadow .1s}
.hs-hero-cta:hover{transform:translate(1px,1px);box-shadow:3px 3px 0 var(--accent)}
.hs-hero-cta:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--accent)}
.hs-hero-cta svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.3;fill:none}
.hs-footer{max-width:1140px;margin:20px auto 0;padding:26px 40px 70px;border-top:1px solid var(--line);
  font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
.tsec{display:grid;grid-template-columns:1.05fr .95fr;gap:72px;align-items:center;max-width:1140px;margin:0 auto;padding:84px 40px;border-top:1px solid var(--line-2)}
.tsec:first-of-type{border-top:0;padding-top:56px}
.tsec-kicker{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.tsec-status{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);
  display:inline-flex;align-items:center;gap:6px}
.tsec-status::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
.tsec-tag{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
.tsec-h{font-size:46px;line-height:1.05;font-weight:800;letter-spacing:-.03em}
.tsec-p{color:var(--ink-2);font-size:17px;line-height:1.66;margin-top:20px;max-width:46ch}
.tsec-feat{list-style:none;margin:24px 0 0;display:flex;flex-direction:column;gap:13px}
.tsec-feat li{display:flex;align-items:center;gap:12px;font-size:15px;color:var(--ink-2)}
.tsec-feat .ck{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;flex:none}
.tsec-feat .ck svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none}
.tsec-cta{display:inline-flex;align-items:center;gap:9px;margin-top:30px;background:#fff;color:var(--ink);font-size:15.5px;font-weight:700;
  padding:15px 28px;border:1.7px solid var(--ink);border-radius:13px;cursor:pointer;font-family:inherit;
  box-shadow:4px 4px 0 var(--accent);transition:transform .1s,box-shadow .1s}
.tsec-cta:hover{transform:translate(1px,1px);box-shadow:3px 3px 0 var(--accent)}
.tsec-cta:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--accent)}
.tsec-cta svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.2;fill:none}
.tsec-media{position:relative;min-height:400px;display:flex;align-items:center;justify-content:center}
.tsec-frame{position:absolute;width:84%;aspect-ratio:4/3;border:3px solid;border-radius:18px;z-index:1}
.tsec-shot{width:90%;aspect-ratio:4/3;border-radius:18px;position:relative;z-index:2;
  background-size:cover,cover;background-position:center;box-shadow:0 20px 50px -16px rgba(16,26,51,.26)}
@media(max-width:860px){.tsec{grid-template-columns:1fr;gap:34px;padding:52px 26px}
  .tsec-media{min-height:280px;order:2}.hs-hero{aspect-ratio:auto;min-height:420px}.hs-hero-h{font-size:34px}.hs-hero-p{font-size:15.5px}.tsec-h{font-size:32px}}

/* tool page */
.tool-head{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.tool-head .code-tile{width:44px;height:44px;font-size:15px;box-shadow:var(--shadow-sm)}
.tool-head h1{font-size:22px;font-weight:800;letter-spacing:-.02em}
.tool-head .th-tag{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:2px;
  text-transform:uppercase;letter-spacing:.03em}
.tool-head .th-actions{margin-left:auto;display:flex;gap:9px}
.tool-frame{border:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow-sm);
  height:calc(100vh - 200px);min-height:440px;overflow:hidden}
.tool-frame iframe{width:100%;height:100%;border:0;display:block;background:#fff}
.frame-note{font-size:12px;color:var(--faint);margin-top:10px;display:flex;align-items:center;gap:7px}
.empty{border:1px dashed var(--line);background:var(--surface-2);padding:56px 30px;text-align:center}
.empty .code-tile{width:56px;height:56px;font-size:19px;margin:0 auto 18px;opacity:.9}
.empty h3{font-size:17px;font-weight:700;letter-spacing:-.01em}
.empty p{color:var(--muted);margin:8px auto 0;max-width:42ch;font-size:13.5px}

/* people & access */
.people-head{display:flex;align-items:flex-start;margin-bottom:22px}
.people-head h1{font-size:26px;font-weight:800;letter-spacing:-.02em}
.people-head p{color:var(--muted);margin-top:6px;font-size:14px}
.people-head .spacer{flex:1}
.tablewrap{border:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow-sm);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--faint);padding:12px 16px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:13px 16px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tr:last-child td{border-bottom:0}
.uname{display:flex;align-items:center;gap:10px}
.uname .code-tile{width:30px;height:30px;font-size:11px;background:var(--navy)}
.uname .n{font-weight:600}
.uname .e{font-size:11.5px;color:var(--muted)}
.acccell{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;
  text-transform:uppercase;letter-spacing:.03em;padding:2px 7px;border:1px solid var(--line);margin:2px 3px 2px 0}
.acccell.admin{color:var(--accent);border-color:#bcd0f5}
.acccell.user{color:var(--ink-2)}
.acccell.none{color:var(--faint)}

/* segmented control */
.seg{display:inline-flex;border:1px solid var(--line);overflow:hidden}
.seg button{padding:6px 12px;font-size:12px;font-weight:600;color:var(--muted);background:var(--surface);
  border-right:1px solid var(--line)}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--accent);color:#fff}
.accgrid{display:flex;flex-direction:column;gap:12px}
.accrow{display:flex;align-items:center;gap:14px}
.accrow .code-tile{width:34px;height:34px;font-size:11px}
.accrow .tn{font-weight:600;font-size:13.5px}
.accrow .tt{font-size:11px;color:var(--muted);font-family:var(--mono);text-transform:uppercase}
.accrow .seg{margin-left:auto}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(16,26,51,.34);display:none;z-index:70;
  align-items:flex-start;justify-content:center;padding:40px 20px;overflow:auto}
.scrim.on{display:flex}
.modal{background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-lg);
  width:100%;max-width:520px;margin-top:20px}
.mhead{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--line)}
.mhead h3{font-size:16px;font-weight:700;flex:1}
.mhead .x{width:30px;height:30px;display:grid;place-items:center;cursor:pointer;color:var(--muted)}
.mhead .x:hover{background:var(--surface-3)}
.mbody{padding:22px}
.mfoot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px}
.dsec-h{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);
  margin:6px 0 12px}

/* rounded modal + Add/Manage user controls (no sharp edges) */
.modal{border-radius:18px;overflow:hidden;box-shadow:0 30px 80px -30px rgba(16,26,51,.5)}
.modal input,.modal select,.modal .btn{border-radius:11px}
.modal .seg{border-radius:10px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pwrow{display:flex;gap:8px}.pwrow input{flex:1}
.hint{font-size:11px;color:var(--faint);margin-top:5px}
.master-callout{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border:1px solid var(--line);
  border-radius:14px;background:var(--surface-2);font-size:13.5px;line-height:1.45;cursor:pointer;margin-top:4px}
.master-callout input{width:16px;height:16px;margin-top:2px;flex:none}
.tlist{display:flex;flex-direction:column}
.trow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line-2)}
.trow:last-child{border-bottom:0}
.trow .mid{flex:1}
.tdot{width:9px;height:9px;border-radius:50%;flex:none}
.acc-sel{border:1px solid var(--line);padding:9px 12px;font-size:13px;font-family:inherit;font-weight:600;
  color:var(--ink);background:#fff;min-width:132px}

/* rounded buttons + avatar (premium) */
.btn{border-radius:11px}
.av-sq{border-radius:10px}
/* People & Access — option D (grouped, rounded cards) */
.p-sec{margin-bottom:22px}
.p-sec-t{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);margin:0 4px 10px}
.p-card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px -16px rgba(16,26,51,.14);overflow:hidden}
.p-row{display:grid;grid-template-columns:2.4fr 2fr auto;gap:16px;align-items:center;padding:15px 22px;border-bottom:1px solid var(--line-2)}
.p-row:last-child{border-bottom:0}
.p-person{display:flex;align-items:center;gap:12px}
.p-nm{font-weight:700;font-size:14.5px}
.p-em{font-size:12.5px;color:var(--muted);margin-top:1px}
.p-all{font-size:12.5px;color:var(--muted)}
.p-none{font-size:12px;color:var(--faint)}
.p-chips{display:flex;gap:6px;flex-wrap:wrap}
.p-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line-2);color:var(--ink-2)}
.p-chip .cd{width:7px;height:7px;border-radius:50%}
.p-act{display:flex;align-items:center;gap:8px;justify-self:end}
.p-mini{font-size:12.5px;font-weight:600;color:var(--accent);background:none;border:0;cursor:pointer}
.dots-btn{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:var(--muted);border:1px solid var(--line);background:#fff;cursor:pointer;font-size:16px}
.dots-btn:hover{background:var(--surface-3)}
.p-empty{padding:22px;text-align:center;color:var(--muted);font-size:13px}

/* menu + toast + notice */
.menu{position:fixed;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);
  min-width:180px;z-index:80;display:none;padding:5px}
.menu.on{display:block}
.menu button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;font-size:13px;padding:9px 11px;color:var(--ink)}
.menu button:hover{background:var(--surface-3)}
.menu button .ico{width:15px;height:15px;color:var(--muted)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--navy);color:#fff;padding:11px 18px;font-size:13px;font-weight:500;
  box-shadow:var(--shadow);opacity:0;transition:.22s;z-index:90;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.notice{max-width:560px;margin:12vh auto;background:var(--surface);border:1px solid var(--line);
  box-shadow:var(--shadow-sm);padding:34px}
.notice h2{font-size:19px;font-weight:800;letter-spacing:-.02em;margin-bottom:10px}
.notice p{color:var(--ink-2);font-size:13.5px;line-height:1.6;margin-bottom:10px}
.notice code{font-family:var(--mono);font-size:12px;background:var(--surface-3);padding:2px 6px}
.spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;
  animation:sp .7s linear infinite;margin:14vh auto}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:860px){
  .login{grid-template-columns:1fr}.brand{padding:30px 26px}.brand-index{display:none}
  .tool-grid{grid-template-columns:1fr}.page{padding:24px 16px 48px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

    const { data, error } = await client().auth.getSession();
    if (error) throw error;
    return data.session;
  }
  async function signIn(email, password) {
    return client().auth.signInWithPassword({ email, password });
  }
  async function signOut() {
    try { await client().auth.signOut(); } catch (e) {}
    _me = null;
  }
  // For tools (Phase 5): bounce to the shell login if there's no session.
  async function requireSession(loginUrl) {
    const s = await getSession();
    if (!s) { global.location.href = loginUrl || 'index.html'; return null; }
    return s;
  }

  /* ---------------- who am I ---------------- */
  async function loadMe(force) {
    if (_me && !force) return _me;
    const s = await getSession();
    if (!s) { _me = null; return null; }
    const uid = s.user.id;
    const [{ data: profile }, { data: access }] = await Promise.all([
      client().from('profiles').select('*').eq('id', uid).single(),
      client().from('tool_access').select('tool_id, role').eq('user_id', uid),
    ]);
    _me = {
      id: uid,
      email: s.user.email,
      full_name: (profile && profile.full_name) || '',
      is_master_admin: !!(profile && profile.is_master_admin),
      status: (profile && profile.status) || 'active',
      access: access || [],
    };
    return _me;
  }
  function me() { return _me; }
  function isMaster() { return !!(_me && _me.is_master_admin); }
  function roleInTool(toolId) {
    if (isMaster()) return 'admin';
    const a = _me && _me.access.find(x => x.tool_id === toolId);
    return a ? a.role : null;
  }
  function canAccessTool(toolId) { return isMaster() || !!roleInTool(toolId); }
  // ids of tools this user may see (master sees all supplied ids)
  function myToolIds(allIds) {
    if (isMaster()) return (allIds || []).slice();
    return _me ? _me.access.map(a => a.tool_id) : [];
  }

  /* ---------------- Master Admin: people & access ---------------- */
  async function listUsers() {
    const { data, error } = await client()
      .from('profiles')
      .select('id, full_name, email, is_master_admin, status, tool_access(tool_id, role)')
      .order('created_at', { ascending: true });
    if (error) throw error;
    return data || [];
  }
  async function grantAccess(userId, toolId, role) {
    const { error } = await client()
      .from('tool_access')
      .upsert({ user_id: userId, tool_id: toolId, role }, { onConflict: 'user_id,tool_id' });
    if (error) throw error;
  }
  async function revokeAccess(userId, toolId) {
    const { error } = await client()
      .from('tool_access').delete().eq('user_id', userId).eq('tool_id', toolId);
    if (error) throw error;
  }
  // privileged Master-Admin actions go through the admin-user Edge Function
  async function adminUser(action, payload) {
    const s = await getSession();
    const res = await fetch(cfg.url + '/functions/v1/admin-user', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (s ? s.access_token : ''),
      },
      body: JSON.stringify({ action, ...(payload || {}) }),
    });
    const out = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(out.error || (action + ' failed (' + res.status + ')'));
    return out;
  }
  async function setMaster(userId, val) {
    return adminUser('set_master', { user_id: userId, value: !!val });
  }
  async function deleteUser(userId) {
    return adminUser('delete', { user_id: userId });
  }
  // create a brand-new user DIRECTLY (no email invite): master sets/omits a
  // password; the account is created already-confirmed so they can sign in now.
  // returns { ok, user_id, email, password, generated }
  async function addUser(email, fullName, grants, password, isMaster) {
    return adminUser('create', {
      email, full_name: fullName, grants: grants || [], password: password || '', is_master: !!isMaster,
    });
  }

  /* ---------------- account self-service ---------------- */
  async function updateMyName(fullName) {
    const s = await getSession(); if (!s) throw new Error('Not signed in');
    const { error } = await client().from('profiles').update({ full_name: fullName }).eq('id', s.user.id);
    if (error) throw error;
    try { await client().auth.updateUser({ data: { full_name: fullName } }); } catch (e) {}
    if (_me) _me.full_name = fullName;
  }
  async function changePassword(newPassword) {
    const { error } = await client().auth.updateUser({ password: newPassword });
    if (error) throw error;
  }

  /* ---------------- field permissions (server-resolved) ---------------- */
  // returns { field_key: {read:bool, write:bool}, ... } for the current user in a tool
  async function fieldPerms(toolId) {
    const { data, error } = await client().rpc('my_field_perms', { p_tool: toolId });
    if (error) throw error;
    const map = {};
    (data || []).forEach(r => { map[r.field_key] = { read: r.can_read, write: r.can_write }; });
    return map;
  }

  global.EHS = {
    configured, client, getSession, signIn, signOut, requireSession,
    loadMe, me, isMaster, roleInTool, canAccessTool, myToolIds,
    listUsers, grantAccess, revokeAccess, setMaster, deleteUser, addUser, updateMyName, changePassword, fieldPerms,
  };
})(window);

</script>

/* =====================================================================
   BOOT + ROUTER
   ===================================================================== */
async function boot(){
  const cfg = window.EHS_CONFIG || {};
  const keysSet = cfg.url && cfg.anon
    && !String(cfg.url).startsWith('PASTE') && !String(cfg.anon).startsWith('PASTE');
  if(!keysSet) return renderConfigNotice('keys');
  if(!window.supabase) return renderConfigNotice('lib');
  window.addEventListener('hashchange',route);
  root().innerHTML=`<div class="spin"></div>`;
  try{
    const me = await EHS.loadMe(true);
    if(!me) return renderLogin();
    route();
  }catch(e){ renderLogin(e.message); }
}
async function route(){
  if(!EHS.me()){ return renderLogin(); }
  const h=location.hash.replace(/^#\/?/,'');
  if(h==='people'){ return EHS.isMaster()? renderPeople() : (go('#/'), renderHome()); }
  renderHome();
}
// open a tool in its own new tab (session is shared across tabs, same origin)
function openTool(id){
  const t=tool(id); if(!t) return;
  if(!EHS.canAccessTool(id)){ toast('You don\u2019t have access to that tool.'); return; }
  window.open(t.file, '_blank');
}

/* ---------------- config notice (before keys are set) ---------------- */
function renderConfigNotice(kind){
  if(kind==='lib'){
    root().innerHTML=`<div class="notice">
      <h2>Couldn\u2019t load Supabase</h2>
      <p>Your keys are set, but the Supabase library didn\u2019t load \u2014 usually a network block or an ad-blocker stopping <code>cdn.jsdelivr.net</code>.</p>
      <p>Try a different network or disable the blocker for this site, then reload.</p>
    </div>`; return;
  }
  root().innerHTML=`<div class="notice">
    <h2>Almost there \u2014 add your Supabase keys</h2>
    <p>Open <code>index.html</code> and paste your new project\u2019s <code>url</code> and <code>anon</code> key into the <code>EHS_CONFIG</code> block near the top.</p>
    <p>Find them in Supabase \u2192 Project Settings \u2192 API. Both are safe in the browser. Don\u2019t paste the <code>service_role</code> key.</p>
  </div>`;
}

/* =====================================================================
   LOGIN
   ===================================================================== */
function renderLogin(errMsg){
  root().innerHTML=`
  <div class="login">
    <div class="brand"></div>
    <img class="corner-logo" src="${LOGO}" alt="EduHubSpot">
    <div class="formside"><div class="formcard">
      <h2>Sign in</h2><div class="sub">Use your EduHubSpot workspace account.</div>
      ${errMsg?`<div class="err">${esc(errMsg)}</div>`:''}
      <div class="field"><label>Email</label>
        <input id="li_email" type="email" placeholder="you@eduhubspot.com" autocomplete="username"></div>
      <div class="field"><label>Password</label>
        <input id="li_pw" type="password" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn accent signin" id="li_btn" onclick="doLogin()">${ic('lock')} Sign in</button>
      <div class="formfoot">Protected workspace \u00b7 authorized users only</div>
    </div></div>
  </div>`;
}
async function doLogin(){
  const email=($('li_email').value||'').trim(), pw=$('li_pw').value||'';
  if(!email||!pw){ return renderLogin('Enter your email and password.'); }
  const btn=$('li_btn'); btn.disabled=true; btn.textContent='Signing in\u2026';
  try{
    const { error } = await EHS.signIn(email,pw);
    if(error){ return renderLogin(error.message || 'That email and password don\u2019t match.'); }
    await EHS.loadMe(true); go('#/'); route();
  }catch(e){ renderLogin(e.message); }
}
async function logout(){ await EHS.signOut(); renderLogin(); }

/* =====================================================================
   APP SHELL
   ===================================================================== */
/* PM-tool-style avatar: square, tinted bg, coloured border + initials */
const AV_COLORS=['#C2410C','#3B6FE0','#0E8F5A','#7C3AED','#B96A00','#0891B2','#BE185D'];
function avColor(s){ let h=0; for(const c of (s||'?')) h=(h*31+c.charCodeAt(0))>>>0; return AV_COLORS[h%AV_COLORS.length]; }
function avatarSq(name,size=30){ const c=avColor(name); const bw=size>=30?1.5:1.25;
  return `<span class="av-sq" style="width:${size}px;height:${size}px;background:${c}20;border:${bw}px solid ${c};color:${c};font-size:${Math.max(10,Math.round(size*0.4))}px">${esc(initials(name))}</span>`; }

function topbar(title, sub){
  const u=EHS.me();
  const dn=(u.full_name&&u.full_name.trim())?u.full_name.trim():friendlyName(u);
  return `<div class="topbar">
    <div class="tb-brand" onclick="go('#/')"><img src="${LOGO}" alt="EHS">
      <span class="tb-div"></span><span class="tb-wf">Workforce</span></div>
    <div class="tb-spacer"></div>
    ${EHS.isMaster()?`<div class="tb-link ${location.hash.includes('people')?'on':''}" onclick="go('#/people')">${ic('users')} Admin Panel</div>`:''}
    <div class="tb-acct" onclick="acctMenu(event)">${avatarSq(dn,30)}
      <div><div class="who">${esc(dn)}</div>
        <div class="role">${EHS.isMaster()?'Master Admin':'Member'}</div></div>${ic('chevron')}</div>
  </div>`;
}
function acctMenu(e){ e.stopPropagation(); openMenu(e.currentTarget,[
  {label:'Account settings', icon:'settings', on:openSettings},
  {label:'Sign out', icon:'logout', on:logout},
]); }
function openSettings(){
  const u=EHS.me(); const parts=(u.full_name||'').trim().split(/\s+/);
  const first=parts[0]||''; const last=parts.slice(1).join(' ')||'';
  $('modal').innerHTML=`
    <div class="mhead">${ic('settings')}<h3>Account settings</h3><div class="x" onclick="closeModal()">${ic('x')}</div></div>
    <div class="mbody">
      <div class="dsec-h">Your details</div>
      <div class="frow2">
        <div class="field"><label>First name <span style="color:var(--crit)">*</span></label><input id="st_first" type="text" value="${esc(first)}"></div>
        <div class="field"><label>Last name <span style="color:var(--crit)">*</span></label><input id="st_last" type="text" value="${esc(last)}"></div>
      </div>
      <div class="field"><label>Email</label><input type="email" value="${esc(u.email)}" disabled style="opacity:.6">
        <div class="hint">Contact a Master Admin to change your email.</div></div>
      <div class="dsec-h" style="margin-top:20px">Change password</div>
      <div class="field"><label>New password</label><input id="st_pw" type="password" placeholder="Leave blank to keep current" autocomplete="new-password"></div>
      <div class="field"><label>Confirm new password</label><input id="st_pw2" type="password" placeholder="Re-enter new password" autocomplete="new-password">
        <div class="hint">At least 6 characters.</div></div>
    </div>
    <div class="mfoot"><button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn accent" id="st_save" onclick="saveSettings()">Save changes</button></div>`;
  $('scrim').classList.add('on');
}
async function saveSettings(){
  const first=($('st_first').value||'').trim(), last=($('st_last').value||'').trim();
  const pw=($('st_pw').value||''), pw2=($('st_pw2').value||'');
  if(!first){ toast('Enter a first name'); $('st_first').focus(); return; }
  if(!last){ toast('Enter a last name'); $('st_last').focus(); return; }
  if(pw){ if(pw.length<6){ toast('Password must be at least 6 characters'); $('st_pw').focus(); return; }
          if(pw!==pw2){ toast('Passwords don\u2019t match'); $('st_pw2').focus(); return; } }
  const name=(first+' '+last).trim();
  const btn=$('st_save'); btn.disabled=true; btn.textContent='Saving\u2026';
  try{
    const me=EHS.me();
    if(name!==(me.full_name||'')) await EHS.updateMyName(name);
    if(pw) await EHS.changePassword(pw);
    await EHS.loadMe(true);
    closeModal(); toast('Settings saved'); route();
  }catch(e){ btn.disabled=false; btn.textContent='Save changes'; toast('Couldn\u2019t save: '+e.message); }
}

/* ---------------- HOME (premium showcase) ---------------- */
function friendlyName(u){
  if(u.full_name && u.full_name.trim()) return u.full_name.trim().split(/\s+/)[0];
  const lp=(u.email||'').split('@')[0].replace(/[._\-0-9]+/g,' ').trim().split(/\s+/)[0]||'there';
  return lp.charAt(0).toUpperCase()+lp.slice(1);
}
function renderHome(){
  const u=EHS.me();
  const ids=EHS.myToolIds(ALL_IDS);
  const mine=TOOLS.filter(t=>ids.includes(t.id));
  const sections=mine.map((t,i)=>toolSection(t,i)).join('');
  root().innerHTML=`<div class="shell home-grid">${topbar()}
    <div class="hs-hero">
      <div class="hs-hero-bg"></div>
      <div class="hs-hero-scrim"></div>
      <div class="hs-hero-grid"></div>
      <div class="hs-hero-in">
        <h1 class="hs-hero-h">The modern workspace<br>for modern teams</h1>
        <p class="hs-hero-p">Everything your team needs to plan, build, test, and deliver.</p>
        <div class="hs-rotator"><div class="hs-rot-list">
          <span>Project Management</span>
          <span>Delivery Management</span>
          <span>Operations Management</span>
          <span>Products &amp; Licenses</span>
          <span>Project Management</span>
        </div></div>
        <button class="hs-hero-cta" onclick="document.querySelector('.tsec')&&document.querySelector('.tsec').scrollIntoView({behavior:'smooth'})">Explore your tools <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg></button>
      </div>
    </div>
    ${sections || `<div class="page"><div class="emptytools">Ask a workspace admin for access.</div></div>`}
    <div class="hs-footer">${SUITE.wordmark[0]} ${SUITE.wordmark[1]} \u00b7 EduHubSpot internal</div>
  </div>`;
}
function toolSection(t,i){
  const live=t.status==='live';
  const imgRight=(i%2===0);
  const off=imgRight?'28px':'-28px';
  const c='#3B6FE0';                       // single blue theme for all tools on the launcher
  const shot=`background-image:linear-gradient(145deg, ${c}1f, ${c}0d), url('${window.__IMGS['tool-'+t.id]||''}')`;
  const media=`<div class="tsec-media">
      <div class="tsec-frame" style="border-color:${c};transform:translate(${off},28px)"></div>
      <div class="tsec-shot" style="${shot}"></div></div>`;
  const feats=(t.features||[]).map(f=>`<li><span class="ck" style="background:${c}1f;color:${c}">
      <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>${esc(f)}</li>`).join('');
  const txt=`<div class="tsec-txt">
      <div class="tsec-kicker"><span class="tsec-status ${live?'live':''}" style="${live?'color:'+c:''}">${live?'Live':'Planned'}</span>
        <span class="tsec-tag">${esc(t.name)} \u00b7 ${esc(t.tagline)}</span></div>
      <h2 class="tsec-h">${esc(t.head.a)} <span style="color:${c}">${esc(t.head.b)}</span></h2>
      <p class="tsec-p">${esc(t.body)}</p>
      <ul class="tsec-feat">${feats}</ul>
      <button class="tsec-cta" onclick="openTool('${t.id}')">
        ${live?'Open '+esc(t.name):'View page'} <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    </div>`;
  return `<section class="tsec">${imgRight ? txt+media : media+txt}</section>`;
}


/* =====================================================================
   PEOPLE & ACCESS  (Master Admin)
   ===================================================================== */
let _users=[];
async function renderPeople(){
  root().innerHTML=`<div class="shell">${topbar()}<div class="page"><div class="spin"></div></div></div>`;
  try{ _users = await EHS.listUsers(); }catch(e){ _users=[]; toast('Couldn\u2019t load users: '+e.message); }
  const masters=_users.filter(u=>u.is_master_admin);
  const members=_users.filter(u=>!u.is_master_admin);
  const section=(title,list)=>`
    <div class="p-sec"><div class="p-sec-t">${title} \u00b7 ${list.length}</div>
      <div class="p-card">${list.length?list.map(userRow).join(''):`<div class="p-empty">No one here yet.</div>`}</div></div>`;
  root().innerHTML=`<div class="shell">${topbar()}<div class="page">
    <div class="people-head"><div><h1>People & Access</h1>
      <p>Add people, choose their tools, and set Admin or User per tool.</p></div>
      <div class="spacer"></div><button class="btn accent" onclick="openInvite()">${ic("plus")} Add user</button></div>
    ${section('Master Admins',masters)}
    ${section('Members',members)}
  </div></div>`;
}
function userRow(u){
  const acc=(u.tool_access||[]);
  const access=u.is_master_admin
    ? '<span class="p-all">All tools</span>'
    : `<div class="p-chips">${ALL_IDS.map(id=>{const a=acc.find(x=>x.tool_id===id); if(!a)return ''; const t=tool(id);
        return `<span class="p-chip"><span class="cd" style="background:${t.accent}"></span>${t.code} \u00b7 ${a.role==='admin'?'Admin':'User'}</span>`;}).filter(Boolean).join('')||'<span class="p-none">No tools yet</span>'}</div>`;
  return `<div class="p-row">
    <div class="p-person">${avatarSq(u.full_name||u.email,40)}
      <div><div class="p-nm">${esc(u.full_name||'\u2014')}</div><div class="p-em">${esc(u.email)}</div></div></div>
    <div class="p-access">${access}</div>
    <div class="p-act"><button class="p-mini" onclick="openAccess('${u.id}')">Manage</button>
      <button class="dots-btn" title="More" onclick="userMenu('${u.id}',event)">\u22ef</button></div>
  </div>`;
}
function userMenu(id, e){
  e.stopPropagation();
  const u=_users.find(x=>x.id===id); if(!u) return;
  const meId=EHS.me()&&EHS.me().id;
  const items=[{label:u.is_master_admin?'Remove Master Admin':'Make Master Admin', icon:'users',
      on:()=>doSetMaster(id, !u.is_master_admin)}];
  if(id!==meId) items.push({label:'Delete user', icon:'trash', danger:true, on:()=>doDeleteUser(id)});
  openMenu(e.currentTarget, items);
}
async function doSetMaster(id,val){
  try{ await EHS.setMaster(id,val); toast(val?'Now a Master Admin':'Master Admin removed'); renderPeople(); }
  catch(e){ toast(e.message); }
}
async function doDeleteUser(id){
  const u=_users.find(x=>x.id===id); const who=u?(u.full_name||u.email):'this user';
  if(!confirm('Delete '+who+'?\n\nThis permanently removes their account and all tool access. This cannot be undone.')) return;
  try{ await EHS.deleteUser(id); toast('User deleted'); renderPeople(); }
  catch(e){ toast('Delete failed: '+e.message); }
}

/* ---- edit one user's access ---- */
function openAccess(userId){
  const u=_users.find(x=>x.id===userId); if(!u) return;
  const acc=(u.tool_access||[]);
  const rows=TOOLS.map(t=>{
    const cur=(acc.find(x=>x.tool_id===t.id)||{}).role||'none';
    return `<div class="trow"><div class="mid"><div class="tn">${esc(t.name)}</div><div class="tt">${esc(t.tagline)}</div></div>
      <select class="acc-sel" data-tool="${t.id}">
        <option value="none"${cur==='none'?' selected':''}>No access</option>
        <option value="user"${cur==='user'?' selected':''}>User</option>
        <option value="admin"${cur==='admin'?' selected':''}>Admin</option>
      </select></div>`;
  }).join('');
  $('modal').innerHTML=`
    <div class="mhead">${avatarSq(u.full_name||u.email,30)}
      <h3>${esc(u.full_name||u.email)}</h3><div class="x" onclick="closeModal()">${ic('x')}</div></div>
    <div class="mbody">
      <label class="master-callout"><input type="checkbox" id="ac_master" ${u.is_master_admin?'checked':''} onchange="toggleMasterEdit()">
        <span>Make this person a <b>Master Admin</b> \u2014 full access to every tool, plus People &amp; Access.</span></label>
      <div id="ac_accsec"><div class="dsec-h" style="margin-top:18px">Tool access</div><div class="tlist">${rows}</div></div>
      <div id="ac_masternote" class="hint" style="display:none;margin-top:12px">Master Admins have access to all tools.</div>
    </div>
    <div class="mfoot"><button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn accent" id="acc_save" onclick="saveAccess('${u.id}')">Save changes</button></div>`;
  toggleMasterEdit();
  $('scrim').classList.add('on');
}
function toggleMasterEdit(){
  const on=$('ac_master').checked;
  $('ac_accsec').style.display=on?'none':'';
  $('ac_masternote').style.display=on?'':'none';
}
async function saveAccess(userId){
  const u=_users.find(x=>x.id===userId);
  const master=$('ac_master').checked;
  const btn=$('acc_save'); btn.disabled=true; btn.textContent='Saving\u2026';
  try{
    if(master!==!!u.is_master_admin) await EHS.setMaster(userId,master);
    if(!master){
      const sels=Array.from(document.querySelectorAll('#modal .acc-sel'));
      for(const s of sels){
        const tid=s.dataset.tool, want=s.value;
        const had=((u.tool_access||[]).find(x=>x.tool_id===tid)||{}).role||'none';
        if(want===had) continue;
        if(want==='none') await EHS.revokeAccess(userId,tid);
        else await EHS.grantAccess(userId,tid,want);
      }
    }
    closeModal(); toast('Access updated'); renderPeople();
  }catch(err){ btn.disabled=false; btn.textContent='Save changes'; toast('Save failed: '+err.message); }
}

/* ---- add a new user ---- */
function openInvite(){
  const rows=TOOLS.map(t=>`<div class="trow">
    <div class="mid"><div class="tn">${esc(t.name)}</div><div class="tt">${esc(t.tagline)}</div></div>
    <select class="acc-sel" data-tool="${t.id}">
      <option value="none">No access</option><option value="user">User</option><option value="admin">Admin</option>
    </select></div>`).join('');
  $('modal').innerHTML=`
    <div class="mhead">${ic('plus')}<h3>Add user</h3><div class="x" onclick="closeModal()">${ic('x')}</div></div>
    <div class="mbody">
      <div class="frow2">
        <div class="field"><label>First name <span style="color:var(--crit)">*</span></label><input id="iv_first" type="text" placeholder="First"></div>
        <div class="field"><label>Last name <span style="color:var(--crit)">*</span></label><input id="iv_last" type="text" placeholder="Last"></div>
      </div>
      <div class="field"><label>Email <span style="color:var(--crit)">*</span></label><input id="iv_email" type="email" placeholder="person@eduhubspot.com"></div>
      <div class="field"><label>Temporary password</label>
        <div class="pwrow"><input id="iv_pw" type="text" placeholder="Leave blank to auto-generate"><button class="btn sm" type="button" onclick="genPw()">Generate</button></div>
        <div class="hint">The user signs in with this straight away and can change it later.</div></div>
      <label class="master-callout"><input type="checkbox" id="iv_master" onchange="toggleMasterCreate()">
        <span>Make this person a <b>Master Admin</b> \u2014 full access to every tool, plus People &amp; Access.</span></label>
      <div id="iv_accsec"><div class="dsec-h" style="margin-top:18px">Tool access</div><div class="tlist">${rows}</div></div>
      <div id="iv_masternote" class="hint" style="display:none;margin-top:12px">This person will have access to all tools as a Master Admin.</div>
    </div>
    <div class="mfoot"><button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn accent" id="iv_btn" onclick="sendInvite()">${ic('plus')} Create user</button></div>`;
  $('scrim').classList.add('on');
}
function genPw(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
  let p=''; for(let i=0;i<12;i++) p+=c[Math.floor(Math.random()*c.length)];
  $('iv_pw').value=p+'!7';
}
function toggleMasterCreate(){
  const on=$('iv_master').checked;
  $('iv_accsec').style.display=on?'none':'';
  $('iv_masternote').style.display=on?'':'none';
}
function showCreds(email,password){
  $('modal').innerHTML=`
    <div class="mhead">${ic('users')}<h3>User created</h3><div class="x" onclick="closeModal()">${ic('x')}</div></div>
    <div class="mbody">
      <p style="font-size:13.5px;color:var(--ink-2);line-height:1.55">Share these sign-in details with the person. They can change the password after their first sign-in.</p>
      <div class="field"><label>Email</label><input type="text" readonly value="${esc(email)}" onclick="this.select()"></div>
      <div class="field"><label>Temporary password</label><input type="text" readonly value="${esc(password)}" onclick="this.select()"></div>
    </div>
    <div class="mfoot"><button class="btn accent" onclick="copyCreds('${esc(email)}','${esc(password)}')">Copy details</button>
      <button class="btn" onclick="closeModal()">Done</button></div>`;
  $('scrim').classList.add('on');
}
function copyCreds(email,password){
  const txt='Email: '+email+'\nTemporary password: '+password;
  navigator.clipboard&&navigator.clipboard.writeText(txt); toast('Copied');
}
function pickInvite(btn,toolId,role){
  btn.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
  window._invite[toolId]=role;
}
async function sendInvite(){
  const first=($('iv_first').value||'').trim(), last=($('iv_last').value||'').trim();
  const email=($('iv_email').value||'').trim(), pw=($('iv_pw').value||'').trim();
  if(!first){ toast('Enter a first name'); $('iv_first').focus(); return; }
  if(!last){ toast('Enter a last name'); $('iv_last').focus(); return; }
  if(!email){ toast('Enter an email'); $('iv_email').focus(); return; }
  if(pw && pw.length<6){ toast('Password must be at least 6 characters'); $('iv_pw').focus(); return; }
  const name=(first+' '+last).trim();
  const isMaster=!!($('iv_master')&&$('iv_master').checked);
  const grants=isMaster?[]:Array.from(document.querySelectorAll('#modal .acc-sel'))
    .map(s=>({tool_id:s.dataset.tool, role:s.value})).filter(g=>g.role&&g.role!=='none');
  const btn=$('iv_btn'); btn.disabled=true; btn.textContent='Creating\u2026';
  try{
    const out=await EHS.addUser(email,name,grants,pw,isMaster);
    renderPeople();
    showCreds(out.email||email, out.password||pw);
  }catch(e){ btn.disabled=false; btn.innerHTML=`${ic('plus')} Create user`; toast('Couldn\u2019t create user: '+e.message); }
}

/* ---------------- menu / global ---------------- */
function openMenu(anchor,items){
  const m=$('menu'); m.innerHTML=items.map((it,i)=>`<button data-i="${i}"${it.danger?' style="color:var(--crit)"':''}>${it.icon?ic(it.icon):''}${esc(it.label)}</button>`).join('');
  const r=anchor.getBoundingClientRect(); m.style.left=(r.right-180)+'px'; m.style.top=(r.bottom+6)+'px'; m.classList.add('on');
  m.querySelectorAll('button').forEach((b,i)=>b.onclick=(e)=>{ e.stopPropagation(); m.classList.remove('on'); items[i].on&&items[i].on(); });
}
document.addEventListener('click',()=>$('menu').classList.remove('on'));
$('scrim').addEventListener('click',e=>{ if(e.target===$('scrim')) closeModal(); });

boot();
</script>
